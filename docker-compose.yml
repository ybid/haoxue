services:
  haoxue:
    build: .
    ports:
      - "8080:80"
    restart: unless-stopped
    container_name: haoxue-math
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    # 如果不需要持久化存储 (localStorage 在浏览器端)，无需 volume
    # 未来如需服务端存储可在此挂载数据目录
