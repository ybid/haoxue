services:
  # ============================================================
  # 口算小达人 - 主应用
  # 使用 nginx 直接挂载静态文件，无需 Dockerfile 构建
  # 更新方式：替换文件后 docker restart haoxue-math
  # ============================================================
  haoxue:
    image: docker.1ms.run/library/nginx:alpine
    ports:
      - "8080:80"
    restart: unless-stopped
    container_name: haoxue-math
    volumes:
      # 主应用文件（直接挂载）
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./manifest.json:/usr/share/nginx/html/manifest.json:ro
      - ./service-worker.js:/usr/share/nginx/html/service-worker.js:ro
      - ./icons:/usr/share/nginx/html/icons:ro

  # ============================================================
  # Watchtower - 自动更新
  # 每 5 分钟检查是否有新版本的 nginx 镜像
  # 同时配合 GitHub Actions → ghcr.io 推送实现自动更新
  # ============================================================
  watchtower:
    image: docker.1ms.run/containrrr/watchtower:latest
    container_name: watchtower-haoxue
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      --interval 300
      --cleanup
      --include-stopped
      haoxue-math
    environment:
      - WATCHTOWER_NO_STARTUP_MESSAGE=true
