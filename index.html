        { id: 'level_6_pass', title: '口算达人', desc: '通过第 6 关', icon: '🥇', xpReward: 100 },
        { id: 'problems_100', title: '百题挑战', desc: '累计完成 100 题', icon: '💯', xpReward: 80 },
        { id: 'problems_500', title: '五百题大师', desc: '累计完成 500 题', icon: '🏅', xpReward: 150 },
        { id: 'all_golden', title: '全关卡王者', desc: '所有 12 关通关', icon: '👑', xpReward: 500 },
        { id: 'streak_7', title: '一周达人', desc: '连续 7 天练习', icon: '📅', xpReward: 100 },
        { id: 'streak_30', title: '月度之星', desc: '连续 30 天练习', icon: '🌟', xpReward: 300 },
        { id: 'combo_10', title: '十连击', desc: '连续答对 10 题', icon: '🔥', xpReward: 60 },
        { id: 'combo_20', title: '二十连击', desc: '连续答对 20 题', icon: '💥', xpReward: 120 },
        { id: 'no_error_level', title: '完美通关', desc: '零失误通关一个关卡', icon: '✨', xpReward: 150 },
        { id: 'speed_demon', title: '闪电手', desc: '平均 2 秒内答题', icon: '⚡', xpReward: 100 }
      ];

      function calcLevel(totalXp) {
        return Math.floor(Math.sqrt(totalXp / 100)) + 1;
      }

      function getStreakCalendar() {
        let cal = profiles.get('streakCalendar');
        if (!cal) {
          cal = { schemaVer: SCHEMA_VERSION, days: {}, currentStreak: 0, longestStreak: 0, lastPracticeDate: null };
          profiles.set('streakCalendar', cal);
        }
        return cal;
      }

      return {
        // ---- 连击系统 ----
        streak: {
          current: 0,
          best: 0,
          lastCorrectTime: 0,

          recordCorrect() {
            const now = Date.now();
            if (now - this.lastCorrectTime > 5000 || this.lastCorrectTime === 0) {
              this.current = 1;
            } else {
              this.current++;
            }
            this.lastCorrectTime = now;
            this.best = Math.max(this.best, this.current);

            if (this.current === 5) {
              ui.toast('🔥 5 连击!', 'success');
              gamification.xp.add('correct_streak_5', '5连击');
            }
            if (this.current === 10) {
              ui.toast('🔥🔥 10 连击! 太厉害了!', 'success');
              gamification.xp.add('correct_streak_10', '10连击');
            }
            if (this.current > 0 && this.current % 5 === 0) {
              ui.confetti({ count: 15, colors: ['#FF6B35', '#FFC857'] });
            }
            return this.current;
          },

          recordWrong() {
            this.current = 0;
          }
        },

        // ---- XP/等级 ----
        xp: {
          add(eventType, detail) {
            const amount = XP_EVENTS[eventType];
            if (!amount) return;
            let xpData = profiles.get('xp');
            if (!xpData) {
              xpData = { totalXp: 0, level: 1, history: [] };
            }
            const oldLevel = calcLevel(xpData.totalXp);
            xpData.totalXp += amount;
            const newLevel = calcLevel(xpData.totalXp);
            xpData.history.unshift({ timestamp: Date.now(), amount, eventType, detail });
            if (xpData.history.length > 50) xpData.history.pop();
            profiles.set('xp', xpData);

            if (newLevel > oldLevel) {
              ui.celebrate({ emoji: '🎊', title: `升级! Lv.${newLevel}`, subtitle: '继续加油！' });
            }
            return amount;
          },

          getLevel() {
            const xpData = profiles.get('xp');
            if (!xpData) return 1;
            return calcLevel(xpData.totalXp);
          },

          getProgress() {
            const xpData = profiles.get('xp');
            if (!xpData || !xpData.totalXp) return 0;
            const level = calcLevel(xpData.totalXp);
            const levelXp = (level - 1) * (level - 1) * 100;
            const nextXp = level * level * 100;
            return (xpData.totalXp - levelXp) / (nextXp - levelXp);
          }
        },

        // ---- 每日任务 ----
        missions: {
          initDaily() {
            const today = utils.formatDate(Date.now());
            let missionsData = profiles.get('missions');
            if (!missionsData) {
              missionsData = { schemaVer: SCHEMA_VERSION, today: { date: '', missions: [], allCompleted: false } };
            }
            if (missionsData.today.date !== today) {
              missionsData.today = {
                date: today,
                missions: utils.shuffle(MISSION_TEMPLATES).slice(0, 3).map(t => ({
                  ...t, progress: 0, completed: false
                })),
                allCompleted: false,
                completedAt: null
              };
              profiles.set('missions', missionsData);
            }
            return missionsData.today;
          },

          recordProgress(type, amount = 1) {
            let missionsData = profiles.get('missions');
            if (!missionsData) {
              missionsData = { schemaVer: SCHEMA_VERSION, today: { date: '', missions: [], allCompleted: false } };
              profiles.set('missions', missionsData);
            }
            const today = this.initDaily();
            let changed = false;
            let allDone = true;
            today.missions.forEach(m => {
              if (m.completed) return;
              if (m.type === type) {
                m.progress += amount;
                if (m.progress >= m.target) {
                  m.completed = true;
                  gamification.xp.add('mission_complete', m.title);
                  ui.toast(`🎯 任务完成: ${m.title}! +${m.xpReward}XP`, 'success');
                  changed = true;
                }
              }
              if (!m.completed) allDone = false;
            });
            if (allDone && !today.allCompleted) {
              today.allCompleted = true;
              today.completedAt = Date.now();
              setTimeout(() => ui.celebrate({ emoji: '🏆', title: '今日全部任务完成!' }), 500);
              changed = true;
            }
            if (changed) {
              missionsData.today = today;
              profiles.set('missions', missionsData);
            }
          }
        },

        // ---- 成就系统 ----
        achievements: {
          check() {
            const achievementData = profiles.get('achievements');
            if (!achievementData) return;
            const progress = profiles.get('progress');
            const masteryData = profiles.get('mastery');
            const unlockedIds = new Set(achievementData.unlocked.map(a => a.id));

            // 累计掌握题数
            let totalMastered = 0;
            Object.values(masteryData.byLevel).forEach(lv => {
              totalMastered += (lv.stats?.mastered || 0);
            });

            const checks = [
              { id: 'mastery_10', test: () => totalMastered >= 10 },
              { id: 'mastery_50', test: () => totalMastered >= 50 },
              { id: 'level_1_pass', test: () => progress.levels[1]?.passed },
              { id: 'level_3_pass', test: () => progress.levels[3]?.passed },
              { id: 'level_6_pass', test: () => progress.levels[6]?.passed },
            ];

            checks.forEach(c => {
              if (!unlockedIds.has(c.id) && c.test()) {
                const def = ACHIEVEMENT_DEFS.find(d => d.id === c.id);
                if (def) {
                  achievementData.unlocked.push({
                    id: c.id, title: def.title, desc: def.desc, icon: def.icon,
                    unlockedAt: Date.now(), seen: false
                  });
                  achievementData.totalUnlocked = achievementData.unlocked.length;
                  gamification.xp.add('achievement', def.title);
                  ui.toast(`🏅 ${def.icon} ${def.title}`, 'success', 3000);
                }
              }
            });
            profiles.set('achievements', achievementData);
          },

          isUnlocked(id) {
            const ad = profiles.get('achievements');
            return ad ? ad.unlocked.some(a => a.id === id) : false;
          },

          getAll() {
            return ACHIEVEMENT_DEFS;
          },

          getUnlocked() {
            const ad = profiles.get('achievements');
            return ad ? ad.unlocked : [];
          }
        },

        // ---- 日历年 ----
        streakCalendar: {
          recordPractice(questionsDone = 0) {
            const xpData = profiles.get('xp');
            const xpEarned = xpData?.totalXp || 0;
            const today = utils.formatDate(Date.now());
            const cal = getStreakCalendar();

            if (cal.lastPracticeDate === today) return; // 当天已记录

            cal.days[today] = { practiced: true, questionsDone, xpEarned };
            cal.lastPracticeDate = today;

            // 计算连续天数
            const sorted = Object.keys(cal.days).sort().reverse();
            let streak = 0;
            const todayDate = new Date();
            for (const dayStr of sorted) {
              const d = new Date(dayStr);
              const diff = Math.round((todayDate - d) / (1000 * 60 * 60 * 24));
              if (diff === streak) {
                streak++;
              } else if (diff > streak) {
                break;
              }
            }
            cal.currentStreak = streak;
            cal.longestStreak = Math.max(cal.longestStreak, streak);

            // 清理 >90 天的数据
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - 90);
            Object.keys(cal.days).forEach(k => {
              if (new Date(k) < cutoff) delete cal.days[k];
            });

            profiles.set('streakCalendar', cal);
          },

          getCurrentStreak() {
            return getStreakCalendar().currentStreak || 0;
          },

          getLongestStreak() {
            return getStreakCalendar().longestStreak || 0;
          }
        }
      };
    })();

    /* =================================================================
     * 模块：mastery（精熟判定 + 错集）
     * ================================================================= */
    const mastery = {};

    mastery.getOrInit = function(levelId) {
      const m = profiles.get('mastery');
      if (!m.byLevel[levelId]) {
        m.byLevel[levelId] = {
          questions: {},
          stats: { mastered: 0, pending: 0, sessionAttempted: 0 }
        };
        profiles.set('mastery', m);
      }
      return m.byLevel[levelId];
    };

    mastery.markError = function(levelId, expr, wrongFirst, reason) {
      const level = this.getOrInit(levelId);
      const errorSets = profiles.get('errorSets');
      if (!errorSets.byLevel[levelId]) errorSets.byLevel[levelId] = [];

      const existing = level.questions[expr];
      if (existing?.status === 'pending') {
        existing.errorCount = (existing.errorCount || 0) + 1;
        existing.attempts = (existing.attempts || 0) + 1;
        if (reason === 'timeout') {
          existing.timeoutCount = (existing.timeoutCount || 0) + 1;
        }

        // 检查冷却
        const settings = profiles.get('settings');
        if (existing.errorCount >= settings.cooldownThreshold) {
          this.enterCooldown(levelId, expr);
          profiles.set('errorSets', errorSets);
          return;
        }
      } else {
        // 从 unseen/mastered 变 pending
        if (existing?.status === 'mastered') {
          // 已掌握的题错了一次，回到 pending
          level.stats.mastered = Math.max(0, (level.stats.mastered || 0) - 1);
        }
        level.questions[expr] = {
          status: 'pending',
          addedToErrorSetAt: Date.now(),
          errorCount: 1,
          attempts: 1,
          timeoutCount: reason === 'timeout' ? 1 : 0,
          cooldownUntil: null
        };
        level.stats.pending = (level.stats.pending || 0) + 1;
        if (!errorSets.byLevel[levelId].includes(expr)) {
          errorSets.byLevel[levelId].push(expr);
        }
      }

      // 记录到错题本
      this.recordErrorToHistory(levelId, expr, wrongFirst, reason);
      profiles.set('mastery', master);
      profiles.set('errorSets', errorSets);
    }.bind({ getOrInit: mastery.getOrInit });

    // 重新定义以正确绑定
    mastery.markError = function(levelId, expr, wrongFirst, reason) {
      const m = profiles.get('mastery');
      if (!m.byLevel[levelId]) {
        m.byLevel[levelId] = {
          questions: {},
          stats: { mastered: 0, pending: 0, sessionAttempted: 0 }
        };
      }
      const level = m.byLevel[levelId];
      const errorSets = profiles.get('errorSets');
      if (!errorSets.byLevel[levelId]) errorSets.byLevel[levelId] = [];

      const existing = level.questions[expr];
      if (existing?.status === 'pending') {
        existing.errorCount = (existing.errorCount || 0) + 1;
        existing.attempts = (existing.attempts || 0) + 1;
        if (reason === 'timeout') {
          existing.timeoutCount = (existing.timeoutCount || 0) + 1;
        }

        const settings = profiles.get('settings');
        if (existing.errorCount >= settings.cooldownThreshold) {
          this.enterCooldown(levelId, expr);
          profiles.set('mastery', m);
          profiles.set('errorSets', errorSets);
          return;
        }
      } else {
        if (existing?.status === 'mastered') {
          level.stats.mastered = Math.max(0, (level.stats.mastered || 0) - 1);
        }
        level.questions[expr] = {
          status: 'pending',
          addedToErrorSetAt: Date.now(),
          errorCount: 1,
          attempts: 1,
          timeoutCount: reason === 'timeout' ? 1 : 0,
          cooldownUntil: null
        };
        level.stats.pending = (level.stats.pending || 0) + 1;
        if (!errorSets.byLevel[levelId].includes(expr)) {
          errorSets.byLevel[levelId].push(expr);
        }
      }

      this.recordErrorToHistory(levelId, expr, wrongFirst, reason);
      profiles.set('mastery', m);
      profiles.set('errorSets', errorSets);
    };

    mastery.markMastered = function(levelId, expr) {
      const m = profiles.get('mastery');
      if (!m.byLevel[levelId]) {
        m.byLevel[levelId] = {
          questions: {},
          stats: { mastered: 0, pending: 0, sessionAttempted: 0 }
        };
      }
      const level = m.byLevel[levelId];
      const errorSets = profiles.get('errorSets');
      if (errorSets.byLevel[levelId]) {
        errorSets.byLevel[levelId] = errorSets.byLevel[levelId].filter(e => e !== expr);
      }

      const existing = level.questions[expr];
      if (existing?.status === 'pending') {
        level.stats.pending = Math.max(0, (level.stats.pending || 0) - 1);
        level.stats.mastered = (level.stats.mastered || 0) + 1;
        level.questions[expr] = {
          status: 'mastered',
          firstCorrectAt: Date.now(),
          attempts: (existing.attempts || 0) + 1
        };
      } else {
        // 之前 unseen 或 mastered 再次答对
        if (!existing) {
          level.stats.mastered = (level.stats.mastered || 0) + 1;
        }
        level.questions[expr] = {
          status: 'mastered',
          firstCorrectAt: existing?.firstCorrectAt || Date.now(),
          attempts: (existing?.attempts || 0) + 1
        };
      }

      // 错题本标记为已通过
      this.markErrorAsMastered(levelId, expr);

      profiles.set('mastery', m);
      profiles.set('errorSets', errorSets);

      // 更新进度
      this.updateProgress(levelId);
    };

    mastery.enterCooldown = function(levelId, expr) {
      const m = profiles.get('mastery');
      const settings = profiles.get('settings');
      const q = m.byLevel[levelId]?.questions[expr];
      if (!q) return;

      q.cooldownUntil = Date.now() + settings.cooldownMinutes * 60 * 1000;
      q.errorCount = 0;
      // 临时从错集移除
      const errorSets = profiles.get('errorSets');
      if (errorSets.byLevel[levelId]) {
        errorSets.byLevel[levelId] = errorSets.byLevel[levelId].filter(e => e !== expr);
      }
      m.byLevel[levelId].stats.pending = Math.max(0, (m.byLevel[levelId].stats.pending || 0) - 1);

      // 冷却结束后自动重新加入错集
      setTimeout(() => {
        const m2 = profiles.get('mastery');
        const es2 = profiles.get('errorSets');
        if (!es2.byLevel[levelId]) es2.byLevel[levelId] = [];
        if (!es2.byLevel[levelId].includes(expr)) {
          es2.byLevel[levelId].push(expr);
          m2.byLevel[levelId].stats.pending = (m2.byLevel[levelId].stats.pending || 0) + 1;
          profiles.set('errorSets', es2);
          profiles.set('mastery', m2);
        }
      }, settings.cooldownMinutes * 60 * 1000);

      profiles.set('mastery', m);
      profiles.set('errorSets', errorSets);
    };

    mastery.isInCooldown = function(levelId, expr) {
      const m = profiles.get('mastery');
      const q = m.byLevel[levelId]?.questions[expr];
      if (!q?.cooldownUntil) return false;
      return Date.now() < q.cooldownUntil;
    };

    mastery.recordErrorToHistory = function(levelId, expr, wrongFirst, reason) {
      const errors = profiles.get('errors');
      const recent = errors.items.find(
        e => e.expr === expr && !e.removedAt &&
        (Date.now() - e.recordedAt) < 7 * 24 * 3600 * 1000
      );
      if (recent) {
        recent.hitCount = (recent.hitCount || 0) + 1;
        if (wrongFirst !== null) recent.wrongFirst = wrongFirst;
      } else {
        const q = generator.generateByExpr(expr, levels.get(levelId));
        errors.items.push({
          id: `err_${Date.now()}_${utils.randInt(100, 999)}`,
          levelId, expr, answer: q.answer,
          wrongFirst: wrongFirst, recordedAt: Date.now(),
          hitCount: 1, removedAt: null, totalAttempts: 1,
          timeoutCount: reason === 'timeout' ? 1 : 0
        });
      }
      // 容量控制
      if (errors.items.length > 200) {
        errors.items.sort((a, b) => a.recordedAt - b.recordedAt);
        errors.items = errors.items.slice(errors.items.length - 200);
      }
      profiles.set('errors', errors);
    };

    mastery.markErrorAsMastered = function(levelId, expr) {
      const errors = profiles.get('errors');
      const err = errors.items.find(
        e => e.expr === expr && !e.removedAt && e.levelId === levelId
      );
      if (err) {
        err.removedAt = Date.now();
        err.totalAttempts = (err.totalAttempts || 0) + 1;
        profiles.set('errors', errors);
      }
    };

    mastery.updateProgress = function(levelId) {
      const m = profiles.get('mastery');
      const progress = profiles.get('progress');
      if (!progress.levels[levelId]) {
        progress.levels[levelId] = {
          unlocked: levels.isUnlocked(levelId),
          passed: false, passedAt: null,
          totalShown: 0, totalCorrect: 0,
          firstCorrectRate: 0, currentSession: 0
        };
      }
      const p = progress.levels[levelId];
      p.totalCorrect = (p.totalCorrect || 0) + 1;
      p.firstCorrectRate = p.totalShown > 0 ? p.totalCorrect / p.totalShown : 0;
      profiles.set('progress', progress);
    };

    mastery.updateShown = function(levelId) {
      const progress = profiles.get('progress');
      if (!progress.levels[levelId]) {
        progress.levels[levelId] = {
          unlocked: levels.isUnlocked(levelId),
          passed: false, passedAt: null,
          totalShown: 0, totalCorrect: 0,
          firstCorrectRate: 0, currentSession: 0
        };
      }
      progress.levels[levelId].totalShown = (progress.levels[levelId].totalShown || 0) + 1;
      progress.levels[levelId].currentSession = (progress.levels[levelId].currentSession || 0) + 1;
      profiles.set('progress', progress);
    };

    mastery.checkLevelPassed = function(levelId) {
      const config = LEVELS.find(l => l.id === levelId);
      const errorSets = profiles.get('errorSets');

      // 条件 1：错集为空
      const noErrors = !(errorSets.byLevel[levelId] && errorSets.byLevel[levelId].length > 0);
      if (!noErrors) return false;

      // 条件 2：
      //   - 如果有关键子集（coverageSet），要求所有子集题目都已掌握
      //   - 否则（综合关卡，coverageSet = null），按"至少做对 30 道"判定
      if (config.coverageSet && config.coverageSet.length > 0) {
        const m = profiles.get('mastery').byLevel[levelId];
        const allMastered = config.coverageSet.every(
          expr => m?.questions?.[expr]?.status === 'mastered'
        );
        return allMastered;
      } else {
        // 综合关卡：至少做对 30 道不同的题
        const m = profiles.get('mastery').byLevel[levelId];
        const masteredCount = m?.stats?.mastered || 0;
        return masteredCount >= 30;
      }
    };

    mastery.getTotalRequired = function(levelId) {
      // 返回关卡的"目标总数"（用于进度显示）
      const config = LEVELS.find(l => l.id === levelId);
      if (config.coverageSet && config.coverageSet.length > 0) {
        return config.coverageSet.length;
      }
      return 30;  // 综合关卡默认 30 道
    };

    mastery.getMasteredInCoverage = function(levelId) {
      // 返回覆盖子集中已掌握的题数
      const config = LEVELS.find(l => l.id === levelId);
      if (!config.coverageSet) {
        const m = profiles.get('mastery').byLevel[levelId];
        return m?.stats?.mastered || 0;
      }
      const m = profiles.get('mastery').byLevel[levelId];
      if (!m?.questions) return 0;
      return config.coverageSet.filter(
        expr => m.questions[expr]?.status === 'mastered'
      ).length;
    };

    mastery.markLevelPassed = function(levelId) {
      const progress = profiles.get('progress');
      if (!progress.levels[levelId]) {
        progress.levels[levelId] = {
          unlocked: true, passed: false, passedAt: null,
          totalShown: 0, totalCorrect: 0, firstCorrectRate: 0
        };
      }
      progress.levels[levelId].passed = true;
      progress.levels[levelId].passedAt = Date.now();
      // 解锁下一关
      if (progress.levels[levelId + 1]) {
        progress.levels[levelId + 1].unlocked = true;
      }
      profiles.set('progress', progress);
    };

    mastery.resetLevel = function(levelId) {
      const m = profiles.get('mastery');
      delete m.byLevel[levelId];
      const errorSets = profiles.get('errorSets');
      delete errorSets.byLevel[levelId];
      const progress = profiles.get('progress');
      if (progress.levels[levelId]) {
        progress.levels[levelId] = {
          unlocked: levels.isUnlocked(levelId),
          passed: false, passedAt: null,
          totalShown: 0, totalCorrect: 0, firstCorrectRate: 0
        };
        // 锁住后续关卡
        for (let i = levelId + 1; i <= LEVELS.length; i++) {
          if (progress.levels[i]) {
            progress.levels[i].unlocked = false;
            progress.levels[i].passed = false;
          }
        }
      }
      profiles.set('mastery', m);
      profiles.set('errorSets', errorSets);
      profiles.set('progress', progress);
    };

    /* =================================================================

    const state = {

      training: {
        levelId: null,
        currentQuestion: null,
        currentOptions: [],
        firstClick: null,

        locked: false,

      },

        this.current = name;

        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const page = document.getElementById(`page-${name}`);

        if (this.routes[name]) this.routes[name]();

    /* =================================================================
     * 模块：ui（通用 UI 组件）
     * ================================================================= */
    const ui = {};

    ui.toast = function(message, type = 'info', duration = 1500) {
      const container = document.getElementById('toast-container');

    /* =================================================================
     * 模块：audio（WebAudio 合成）
     * ================================================================= */
    const audio = {
      ctx: null,
      enabled: true,
      init() {
        if (this.ctx) return;
        try {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          this.enabled = false;
        }
      },
      play(notes, options = {}) {
        if (!this.enabled) return;
        this.init();
        if (!this.ctx) return;
        if (this.ctx.state === 'suspended') {
          this.ctx.resume().catch(() => {});
        }
        const { volume = 0.15, type = 'sine' } = options;
        const now = this.ctx.currentTime;
        notes.forEach(([freq, start, dur], i) => {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = type;
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0, now + start);
          gain.gain.linearRampToValueAtTime(volume, now + start + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.001, now + start + dur);
          osc.connect(gain).connect(this.ctx.destination);
          osc.start(now + start);
          osc.stop(now + start + dur);
        });
      },
      correct() {
        this.play([[523.25, 0, 0.12], [659.25, 0.08, 0.12], [783.99, 0.16, 0.2]]);
      },
      wrong() {
        this.play([[261.63, 0, 0.15]], { type: 'triangle' });
      },
      pass() {
        this.play([
          [523.25, 0, 0.15], [659.25, 0.12, 0.15],
          [783.99, 0.24, 0.15], [1046.5, 0.36, 0.4]
        ]);
      },
      timeout() {
        this.play([[220, 0, 0.2]], { type: 'triangle' });
      }
    };

    /* =================================================================
     * 模块：reports（家长看板报表 / 图表）
     * ================================================================= */
    const reports = {
      // 弱项分析（按运算符统计掌握率）
      weakPointAnalysis(pid) {
        const masteryData = profiles.getReadonly(pid, 'mastery');
        const progress = profiles.getReadonly(pid, 'progress');
        const ops = { '+': { total: 0, mastered: 0 }, '-': { total: 0, mastered: 0 },
                      '×': { total: 0, mastered: 0 }, '÷': { total: 0, mastered: 0 } };

        levels.getAll().forEach(lv => {
          const levelData = masteryData?.byLevel[lv.id];
          if (!levelData?.questions) return;
          Object.entries(levelData.questions).forEach(([expr, q]) => {
            const op = expr.match(/[+\-×÷]/)?.[0];
            if (!op || !ops[op]) return;
            ops[op].total++;
            if (q.status === 'mastered') ops[op].mastered++;
          });
        });
        return Object.entries(ops).map(([op, data]) => ({
          op, total: data.total, mastered: data.mastered,
          rate: data.total > 0 ? (data.mastered / data.total * 100) : 0
        })).sort((a, b) => a.rate - b.rate);
      },

      // 周/月报告
      generatePeriodReport(pid, days = 7) {
        const dailyData = profiles.getReadonly(pid, 'daily');
        const cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - days);
        let totalQuestions = 0, totalCorrect = 0, totalSessions = 0, totalMs = 0;
        let practiceDays = 0;

        Object.entries(dailyData?.byDate || {}).forEach(([date, data]) => {
          if (new Date(date) >= cutoff && data.questions > 0) {
            totalQuestions += data.questions || 0;
            totalSessions += data.sessions || 0;
            totalMs += data.activeMs || 0;
            practiceDays++;
          }
        });
        return {
          period: `${days}天`, practiceDays, totalSessions,
          totalMs, totalQuestions,
          avgPerDay: practiceDays > 0 ? Math.round(totalQuestions / practiceDays) : 0
        };
      },

      // 准确率趋势
      getAccuracyTrend(pid, days = 30) {
        const dailyData = profiles.getReadonly(pid, 'daily');
        const trend = [];
        for (let i = days - 1; i >= 0; i--) {
          const d = new Date();
          d.setDate(d.getDate() - i);
          const key = utils.formatDate(d.getTime());
          const data = dailyData?.byDate?.[key];
          trend.push({
            date: key,
            accuracy: data && data.questions > 0 ? Math.round(data.firstCorrect / data.questions * 100) : null,
            questions: data?.questions || 0
          });
        }
        return trend;
      },

      // SVG 折线图
      renderChart(trendData, containerId) {
        const width = 600, height = 200, pad = { top: 15, right: 15, bottom: 25, left: 40 };
        const plotW = width - pad.left - pad.right;
        const plotH = height - pad.top - pad.bottom;
        const validData = trendData.filter(d => d.accuracy !== null);
        if (validData.length === 0) return;

        let svg = `<svg viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">`;

        // 网格线
        for (let i = 0; i <= 4; i++) {
          const y = pad.top + (plotH * (1 - i / 4));
          svg += `<line x1="${pad.left}" y1="${y}" x2="${width - pad.right}" y2="${y}" stroke="#E8E2D5" stroke-width="1"/>`;
          svg += `<text x="${pad.left - 6}" y="${y + 4}" text-anchor="end" font-size="11" fill="#7F8C8D">${i * 25}%</text>`;
        }

        // 折线
        const points = validData.map((d, i) => {
          const x = pad.left + (i / Math.max(validData.length - 1, 1)) * plotW;
          const y = pad.top + plotH * (1 - (d.accuracy || 0) / 100);
          return `${x},${y}`;
        }).join(' ');
        svg += `<polyline points="${points}" fill="none" stroke="#5BA8E0" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;

        // 面积
        const areaPts = [`${pad.left},${pad.top + plotH}`, points, `${pad.left + plotW},${pad.top + plotH}`].join(' ');
        svg += `<polygon points="${areaPts}" fill="#5BA8E0" opacity="0.1"/>`;

        // 数据点
        validData.forEach((d, i) => {
          const x = pad.left + (i / Math.max(validData.length - 1, 1)) * plotW;
          const y = pad.top + plotH * (1 - (d.accuracy || 0) / 100);
          svg += `<circle cx="${x}" cy="${y}" r="3" fill="#5BA8E0"/>`;
        });

        // X 轴标签（每 5 天显示一个）
        trendData.forEach((d, i) => {
          if (i % 5 === 0 || i === trendData.length - 1) {
            const x = pad.left + (i / Math.max(trendData.length - 1, 1)) * plotW;
            svg += `<text x="${x}" y="${height - 5}" text-anchor="middle" font-size="9" fill="#7F8C8D">${d.date.slice(5)}</text>`;
          }
        });
        svg += '</svg>';

        const container = document.getElementById(containerId);
        if (container) container.innerHTML = svg;
      },

      // 弱项柱状图 (SVG)
      renderWeakChart(data, containerId) {
        const width = 300, height = 150, pad = { top: 10, right: 10, bottom: 25, left: 35 };
        const plotW = width - pad.left - pad.right;
        const plotH = height - pad.top - pad.bottom;
        const barW = plotW / data.length - 10;

        let svg = `<svg viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">`;

        data.forEach((d, i) => {
          const x = pad.left + (i * (plotW / data.length)) + 5;
          const barH = (d.rate / 100) * plotH;
          const y = pad.top + plotH - barH;
          const color = d.rate >= 80 ? '#7BD389' : d.rate >= 50 ? '#FFC857' : '#FF9AA2';
          svg += `<rect x="${x}" y="${y}" width="${Math.max(barW, 10)}" height="${Math.max(barH, 2)}" rx="3" fill="${color}"/>`;
          svg += `<text x="${x + barW / 2}" y="${pad.top + plotH + 14}" text-anchor="middle" font-size="11" fill="#7F8C8D">${d.op}</text>`;
          svg += `<text x="${x + barW / 2}" y="${y - 4}" text-anchor="middle" font-size="10" fill="${color}">${Math.round(d.rate)}%</text>`;
        });
        svg += '</svg>';

        const container = document.getElementById(containerId);
        if (container) container.innerHTML = svg;
      }
    };

    pages.training = function(levelId) {
      router.go('training');
      const config = levels.get(levelId);
      document.getElementById('training-title').textContent = `第 ${config.id} 关 · ${config.name}`;

      // 重置训练状态
      const t = state.training;
      t.levelId = levelId;
      t.firstClick = null;
      t.wrongClicks = new Set();
      t.locked = false;
      t.sessionStart = Date.now();

      // 渲染底部关卡栏
      renderTrainingBottombar();
      // 显示第一题
      showNextQuestion();
    };

    function renderTrainingBottombar() {
      const allLevels = levels.getAll();
      const progress = profiles.get('progress');
      const container = document.getElementById('training-bottombar');
      container.innerHTML = allLevels.map(lv => {
        const p = progress.levels[lv.id] || {};
        const unlocked = levels.isUnlocked(lv.id);
        const active = lv.id === state.training.levelId;
        const passed = !!p.passed;
        return `
          <button class="level-btn ${unlocked ? '' : 'locked'} ${active ? 'active' : ''} ${passed ? 'passed' : ''}"
                  data-level="${lv.id}">
            <div class="level-btn-icon">${unlocked ? lv.icon : '🔒'}</div>
            <div>第${lv.id}关</div>
          </button>
        `;
      }).join('');
      container.querySelectorAll('.level-btn').forEach(btn => {
        btn.onclick = () => {
          const id = parseInt(btn.dataset.level);
          if (!levels.isUnlocked(id)) {
            ui.toast('请先通关前一关', 'warn');
            return;
          }
          clearTrainingTimeout();
          pages.training(id);
        };
      });
    }

    function showNextQuestion() {
      const levelId = state.training.levelId;
      const config = levels.get(levelId);
      const masteryData = profiles.get('mastery').byLevel[levelId] || { questions: {}, stats: { mastered: 0, pending: 0 } };
      const errorSet = (profiles.get('errorSets').byLevel[levelId] || []).filter(
        e => !mastery.isInCooldown(levelId, e)
      );

      // 优先级 1：错集
      let question;
      if (errorSet.length > 0) {
        const expr = utils.pick(errorSet);
        question = generator.generateByExpr(expr, config);
      } else {
        // 优先级 2：随机新题
        question = generator.generate(config);
      }

      // 记录已出题
      mastery.updateShown(levelId);

      // 渲染
      const options = generator.generateOptions(question.answer, question.expr);
      state.training.currentQuestion = question;
      state.training.currentOptions = options;
      state.training.firstClick = null;
      state.training.wrongClicks = new Set();
      state.training.locked = false;

      document.getElementById('expr-text').textContent = utils.formatExprForDisplay(question.expr) + ' = ?';
      renderOptions(options, new Set());
      updateProgressDisplay();
      startTimeout(question);
    }

    function renderOptions(options, wrongClicks) {
      const grid = document.getElementById('options-grid');
      grid.innerHTML = options.map((opt, i) => {
        const isWrong = wrongClicks.has(i);
        const cls = isWrong ? 'eliminated' : '';
        return `<button class="option ${cls}" data-idx="${i}" data-value="${opt}">${opt}</button>`;
      }).join('');
      grid.querySelectorAll('.option').forEach(btn => {
        btn.onclick = () => onOptionClick(parseInt(btn.dataset.idx), parseInt(btn.dataset.value));
      });
    }

    function onOptionClick(idx, value) {
      const t = state.training;
      if (t.locked) return;

      const question = t.currentQuestion;
      const correct = value === question.answer;

      if (t.firstClick === null) {
        // 首次点击
        t.firstClick = idx;
        if (correct) {
          handleCorrect(question);
        } else {
          t.wrongClicks.add(idx);
          handleWrongFirst(question, value);
        }
      } else {
        // 后续点击（错误重选）
        if (correct) {
          // 重选对了
          handleCorrectAfterWrong(question, value);
        } else {
          t.wrongClicks.add(idx);
          // 标记新错误选项
          renderOptions(t.currentOptions, t.wrongClicks);
          // 抖动该选项
          const btn = document.querySelector(`.option[data-idx="${idx}"]`);
          if (btn) {
            btn.classList.add('wrong');
            setTimeout(() => btn.classList.remove('wrong'), 400);
          }
          audio.wrong();
        }
      }
    }

    function handleCorrect(question) {
      const t = state.training;
      t.locked = true;
      clearTrainingTimeout();

      // 记录智能难度数据
      const responseMs = Math.round(performance.now() - t.timeoutStartTime);
      smartDifficulty.recordAttempt(t.levelId, true, responseMs, false);

      // 标记掌握
      mastery.markMastered(t.levelId, question.expr);

      // 游戏化：连击 + XP + 任务 + 日历
      gamification.streak.recordCorrect();
      gamification.xp.add('correct', question.expr);
      gamification.missions.recordProgress('questions');
      gamification.missions.recordProgress('streak');
      gamification.streakCalendar.recordPractice();

      // UI 反馈
      const btn = document.querySelector(`.option[data-idx="${t.firstClick}"]`);
      if (btn) {
        btn.classList.add('correct');
      }
      audio.correct();
      ui.toast(question.firstTime ? '你掌握啦！' : '太棒了！', 'success', 800);

      updateProgressDisplay();

      // 检查通关
      if (mastery.checkLevelPassed(t.levelId)) {
        // 已通关
        setTimeout(() => {
          if (!profiles.get('progress').levels[t.levelId]?.passed) {
            handleLevelPassed(t.levelId);
          } else {
            // 之前已通关，回退练习
            setTimeout(() => showNextQuestion(), 800);
          }
        }, 800);
      } else {
        setTimeout(() => showNextQuestion(), 800);
      }
    }

    function handleWrongFirst(question, wrongValue) {
      const t = state.training;
      // 记录智能难度数据
      const responseMs = Math.round(performance.now() - t.timeoutStartTime);
      smartDifficulty.recordAttempt(t.levelId, false, responseMs, false);
      // 重置连击
      gamification.streak.recordWrong();
      // 标记错误
      mastery.markError(t.levelId, question.expr, wrongValue, 'click');

      // UI 反馈
      const btn = document.querySelector(`.option[data-idx="${t.firstClick}"]`);
      if (btn) {
        btn.classList.add('wrong');
        setTimeout(() => btn.classList.remove('wrong'), 400);
      }
      audio.wrong();
      ui.toast('再看看哦~', 'error', 1000);
      updateProgressDisplay();

      // 重新渲染，标记已错误选项
      renderOptions(t.currentOptions, t.wrongClicks);
    }

    function handleCorrectAfterWrong(question, value) {
      const t = state.training;
      t.locked = true;
      clearTrainingTimeout();

      // 标记掌握
      mastery.markMastered(t.levelId, question.expr);

      // UI 反馈
      const correctIdx = t.currentOptions.indexOf(value);
      const btn = document.querySelector(`.option[data-idx="${correctIdx}"]`);
      if (btn) {
        btn.classList.add('correct');
      }
      audio.correct();
      ui.toast('你掌握啦！', 'success', 800);

      updateProgressDisplay();

      if (mastery.checkLevelPassed(t.levelId)) {
        setTimeout(() => {
          if (!profiles.get('progress').levels[t.levelId]?.passed) {
            handleLevelPassed(t.levelId);
          } else {
            setTimeout(() => showNextQuestion(), 800);
          }
        }, 800);
      } else {
        setTimeout(() => showNextQuestion(), 800);
      }
    }

    function handleLevelPassed(levelId) {
      mastery.markLevelPassed(levelId);
      gamification.xp.add('level_pass', `第${levelId}关`);
      gamification.missions.recordProgress('level_first_pass');
      const config = levels.get(levelId);
      const nextLevel = levels.get(levelId + 1);
      let subtitle = '🎊';
      if (nextLevel && levels.isUnlocked(levelId + 1)) {
        subtitle = `已解锁：${nextLevel.icon} ${nextLevel.name}`;
      } else if (levelId === 12) {
        subtitle = '🎉 全部关卡通关！';
      }
      audio.pass();
      ui.celebrate({
        emoji: '🎉',
        title: `第 ${levelId} 关通关！`,
        subtitle: subtitle,
        onDismiss: () => {
          renderTrainingBottombar();
          // 检查是否全部通关
          if (levelId === 12) {
            router.go('home');
            pages.home();
          } else {
            // 继续练习或回退
            showNextQuestion();
          }
        }
      });
    }

    function updateProgressDisplay() {
      const levelId = state.training.levelId;
      const stats = (profiles.get('mastery').byLevel[levelId] || { stats: { mastered: 0, pending: 0 } }).stats;
      const errorCount = (profiles.get('errorSets').byLevel[levelId] || []).length;
      const totalRequired = mastery.getTotalRequired(levelId);
      const masteredInCoverage = mastery.getMasteredInCoverage(levelId);
      document.getElementById('progress-label').textContent = `已掌握 ${masteredInCoverage} / ${totalRequired} 道`;
      document.getElementById('progress-pending').textContent = `待掌握 ${errorCount} 道`;
      // 进度条
      const percent = Math.min(100, (masteredInCoverage / totalRequired) * 100);
      document.getElementById('progress-fill').style.width = percent + '%';
      // 智能难度提示
      const labelEl = document.getElementById('difficulty-label');
      if (labelEl) {
        const label = smartDifficulty.getLabel(levelId);
        labelEl.textContent = label || '';
        labelEl.style.display = label ? 'inline' : 'none';
      }
    }

    /* =================================================================
     * 模块：超时判定
     * ================================================================= */
    function startTimeout(question) {
      const t = state.training;
      const config = levels.get(t.levelId);
      const settings = profiles.get('settings');
      const totalMs = smartDifficulty.getTimeoutMs(t.levelId);
      const warnMs = Math.max(0, totalMs - settings.timeoutWarnSec * 1000);

      t.timeoutStartTime = performance.now();
      t.timeoutTimer = setTimeout(() => {
        handleTimeout();
      }, totalMs);

      // 倒计时进度条动画
      const fill = document.getElementById('timeout-fill');
      fill.style.transition = 'none';
      fill.style.width = '100%';
      // 强制 reflow
      fill.offsetHeight;
      fill.style.transition = `width ${totalMs}ms linear`;

      // 警告闪烁
      setTimeout(() => {
        fill.classList.add('warn');
        // 选项也闪烁
        document.querySelectorAll('.option').forEach(opt => {
          opt.classList.add('timeout-warn');
        });
      }, warnMs);
    }

    function clearTrainingTimeout() {
      const t = state.training;
      if (t.timeoutTimer) {
        clearTimeout(t.timeoutTimer);
        t.timeoutTimer = null;
      }
      const fill = document.getElementById('timeout-fill');
      if (fill) {
        fill.classList.remove('warn');
        fill.style.transition = 'none';
      }
      document.querySelectorAll('.option').forEach(opt => {
        opt.classList.remove('timeout-warn');
      });
    }

    function handleTimeout() {
      const t = state.training;
      t.locked = true;

      const question = t.currentQuestion;
      // 记录智能难度（超时）
      const responseMs = Math.round(performance.now() - t.timeoutStartTime);
      smartDifficulty.recordAttempt(t.levelId, false, responseMs, true);
      mastery.markError(t.levelId, question.expr, null, 'timeout');

      audio.timeout();
      ui.toast('没关系的~', 'warn', 1000);
      updateProgressDisplay();

      setTimeout(() => {
        if (mastery.checkLevelPassed(t.levelId)) {
          if (!profiles.get('progress').levels[t.levelId]?.passed) {
            handleLevelPassed(t.levelId);
            return;
          }
        }
        showNextQuestion();
      }, 1200);
    }

    function bindParentActions() {
      const settings = profiles.get('settings');

      document.getElementById('set-timeout-single').onchange = (e) => {
        settings.timeoutSecByType.single = parseInt(e.target.value);
        profiles.set('settings', settings);
        ui.toast('已保存', 'success');
      };
      document.getElementById('set-timeout-double').onchange = (e) => {
        settings.timeoutSecByType.double = parseInt(e.target.value);
        profiles.set('settings', settings);
        ui.toast('已保存', 'success');
      };
      document.getElementById('set-cooldown-threshold').onchange = (e) => {
        settings.cooldownThreshold = parseInt(e.target.value);
        profiles.set('settings', settings);
        ui.toast('已保存', 'success');
      };
      document.getElementById('set-sound').onchange = (e) => {
        settings.sound = e.target.checked;
        profiles.set('settings', settings);
        audio.enabled = e.target.checked;
        ui.toast('已保存', 'success');
      };

      document.getElementById('export-errors').onclick = () => {
        const errors = profiles.get('errors');
        const text = errors.items.map(e =>
          `${e.expr} = ?  正确答案: ${e.answer}  关卡: 第 ${e.levelId} 关  ${e.removedAt ? '✅ 已掌握' : '❌ 未掌握'}  错 ${e.hitCount} 次`
        ).join('\n');
        const blob = new Blob([text || '暂无错题'], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `错题本-${utils.formatDate(Date.now())}.txt`;
        a.click();
        URL.revokeObjectURL(url);
        ui.toast('已导出', 'success');
      };

      document.getElementById('export-all').onclick = () => {
        const dump = {
          exportedAt: Date.now(),
          appVersion: APP_VERSION,
          schemaVer: SCHEMA_VERSION,
          data: {
            profile: profiles.get('profile'),
            settings: profiles.get('settings'),
            progress: profiles.get('progress'),
            mastery: profiles.get('mastery'),
            errorSets: profiles.get('errorSets'),
            errors: profiles.get('errors'),
            achievements: profiles.get('achievements'),
            challenges: profiles.get('challenges'),
            daily: profiles.get('daily')
          }
        };
        const blob = new Blob([JSON.stringify(dump, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `口算数据-${utils.formatDate(Date.now())}.json`;
        a.click();
        URL.revokeObjectURL(url);
        ui.toast('已导出', 'success');
      };

      document.getElementById('import-btn').onclick = () => {
        document.getElementById('import-file').click();
      };
      document.getElementById('import-file').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          if (!data.schemaVer || !data.data) {
            ui.toast('文件格式不正确', 'error');
            return;
          }
          const confirmed = await ui.confirm({
            title: '导入数据？',
            body: '将覆盖当前所有数据。此操作不可撤销。',
            confirmText: '导入',
            danger: true
          });
          if (!confirmed) return;
          Object.entries(data.data).forEach(([k, v]) => {
            if (v) profiles.set(k, v);
          });
          ui.toast('已导入', 'success');
          pages.parent();
        } catch (err) {
          ui.toast('导入失败：' + err.message, 'error');
        }
      };

      document.querySelectorAll('[data-action="reset-level"]').forEach(btn => {
        btn.onclick = async () => {
          const confirmed = await ui.confirm({
            title: '重置当前关卡？',
            body: '将清空当前关卡的掌握与错题记录。',
            confirmText: '重置',
            danger: true
          });
          if (confirmed) {
            mastery.resetLevel(state.training.levelId || 1);
            ui.toast('已重置', 'success');
            pages.parent();
          }
        };
      });

      document.getElementById('reset-all').onclick = async () => {
        const confirmed = await ui.confirm({
          title: '重置全部数据？',
          body: '将删除所有进度、错题、成就。此操作不可撤销。',
          confirmText: '我已了解，删除',
          cancelText: '取消',
          danger: true,
          requirePhrase: '删除'
        });
        if (confirmed) {
          store.clearAll();
          schema.init();
          ui.toast('已重置', 'success');
          setTimeout(() => location.reload(), 500);
        }
      };

      // CSV 导出
      const csvBtn = document.getElementById('export-csv');
      if (csvBtn) {
        csvBtn.onclick = () => {
          const errors = profiles.get('errors');
          const header = '算式,正确答案,关卡,状态,错误次数,超时次数,记录时间\n';
          const rows = errors.items.map(e => {
            const status = e.removedAt ? '已掌握' : '未掌握';
            const time = new Date(e.recordedAt).toLocaleString('zh-CN');
            return `"${e.expr}",${e.answer},第${e.levelId}关,${status},${e.hitCount || 1},${e.timeoutCount || 0},"${time}"`;
          }).join('\n');
          const blob = new Blob([header + rows], { type: 'text/csv;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `答题记录-${utils.formatDate(Date.now())}.csv`;
          a.click();
          URL.revokeObjectURL(url);
          ui.toast('CSV 已导出', 'success');
        };
      }

      // 切换孩子
      const switchBtn = document.getElementById('parent-switch-profile');
      if (switchBtn) {
        switchBtn.onclick = () => {
          hideProfilePicker();
          setTimeout(() => showProfilePicker(), 100);
        };
      }
    }

    /* =================================================================
     * 模块：pages - errors
     * ================================================================= */
    pages.errors = function() {
      router.go('errors');
      renderErrors('pending');
    };

    function renderErrors(tab) {
      const errorSets = profiles.get('errorSets');
      const errors = profiles.get('errors');
      const masteryData = profiles.get('mastery');
      const allLevels = levels.getAll();

      // Tab 切换
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tab);
        t.onclick = () => renderErrors(t.dataset.tab);
      });

      const info = document.getElementById('errors-info');
      const content = document.getElementById('errors-content');
      let html = '';

      if (tab === 'pending') {
        info.style.display = 'block';
        info.textContent = '💡 这些题会在你继续练习时自动重出';
        const pendingItems = [];
        allLevels.forEach(lv => {
          const errs = errorSets.byLevel[lv.id] || [];
          errs.forEach(expr => {
            const m = masteryData.byLevel[lv.id]?.questions[expr] || {};
            pendingItems.push({ lv, expr, m });
          });
        });
        if (pendingItems.length === 0) {
          html = `<div class="empty-state">
            <div class="emoji">🎈</div>
            <div class="msg">暂时没有错题啦~</div>
            <div class="msg" style="margin-top:8px;font-size:14px">继续保持！</div>
          </div>`;
        } else {
          pendingItems.forEach(({ lv, expr, m }) => {
            const cooldown = m.cooldownUntil && Date.now() < m.cooldownUntil;
            html += `
              <div class="error-item">
                <div class="expr">${lv.icon} ${utils.escapeHtml(expr)} = ?</div>
                <div class="meta">第 ${lv.id} 关 · ${cooldown ? '冷却中（' + Math.ceil((m.cooldownUntil - Date.now()) / 60000) + ' 分钟后）' : '错 ' + (m.errorCount || 1) + ' 次'}</div>
              </div>
            `;
          });
          html += `<div style="text-align:center;margin-top:16px;color:var(--color-text-sub);font-size:14px;">继续练习时这些题会自动重出</div>`;
        }
      } else {
        info.style.display = 'none';
        const items = errors.items.filter(e => e.removedAt).slice(-30).reverse();
        if (items.length === 0) {
          html = `<div class="empty-state">
            <div class="emoji">📚</div>
            <div class="msg">还没有历史错题</div>
          </div>`;
        } else {
          items.forEach(err => {
            const lv = levels.get(err.levelId);
            html += `
              <div class="error-item">
                <div class="expr">${utils.escapeHtml(err.expr)} = ${err.answer}</div>
                <div class="meta">${lv ? lv.icon : ''} 第 ${err.levelId} 关 · ✅ 已掌握 · 错 ${err.hitCount} 次</div>
              </div>
            `;
          });
        }
      }

      content.innerHTML = html;
    }

    /* =================================================================
     * 模块：成就（简化版）
     * ================================================================= */
    function checkAchievements() {
      gamification.achievements.check();
      // 更新成就 badge
      const ad = profiles.get('achievements');
      if (ad && ad.totalUnlocked > 0) {
        const badge = document.getElementById('badge-achievements');
        if (badge) {
          badge.textContent = ad.totalUnlocked;
          badge.style.display = 'flex';
        }
      }
    }

    /* =================================================================
     * 模块：成就页
     * ================================================================= */
    pages.achievements = function() {
      router.go('home');
      const ad = profiles.get('achievements');
      const allDefs = gamification.achievements.getAll();
      const unlockedIds = ad ? new Set(ad.unlocked.map(a => a.id)) : new Set();
      const totalUnlocked = ad ? ad.totalUnlocked : 0;

      const content = document.getElementById('home-content');
      let html = `
        <div class="home-header">
          <div class="home-title">🏅 成就</div>
          <div class="home-subtitle">已解锁 ${totalUnlocked} / ${allDefs.length}</div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:var(--space-md);margin-bottom:80px">
      `;

      allDefs.forEach(def => {
        const unlocked = unlockedIds.has(def.id);
        html += `
          <div style="background:${unlocked ? 'var(--color-bg-card)' : 'var(--color-bg)'};border-radius:var(--radius-md);padding:var(--space-md);text-align:center;opacity:${unlocked ? 1 : 0.4};box-shadow:${unlocked ? 'var(--shadow-sm)' : 'none'}">
            <div style="font-size:36px;margin-bottom:var(--space-xs)">${def.icon}</div>
            <div style="font-size:14px;font-weight:600">${def.title}</div>
            <div style="font-size:11px;color:var(--color-text-sub);margin-top:4px">${def.desc}</div>
          </div>
        `;
      });

      html += `</div>`;
      content.innerHTML = html;
    };

    /* =================================================================
     * 模块：pages - profile selector
     * ================================================================= */
    function showProfilePicker() {
      const backdrop = document.getElementById('profile-picker');
      const list = document.getElementById('profile-picker-list');
      const allProfiles = profiles.getAll();
      const active = profiles.getActive();

      list.innerHTML = allProfiles.map(p => `
        <div class="profile-picker-item ${p.id === active?.id ? 'active' : ''}" data-pid="${p.id}">
          <div class="profile-picker-item-avatar">${p.avatar || '👦'}</div>
          <div class="profile-picker-item-info">
            <div class="profile-picker-item-name">${utils.escapeHtml(p.name)}</div>
            <div class="profile-picker-item-meta">${p.id === active?.id ? '当前' : ''}</div>
          </div>
          ${allProfiles.length > 1 ? `<button class="profile-picker-item-delete" data-del="${p.id}">✕</button>` : ''}
        </div>
      `).join('');

      // 子项点击切换
      list.querySelectorAll('.profile-picker-item').forEach(item => {
        const pid = item.dataset.pid;
        item.addEventListener('click', (e) => {
          if (e.target.closest('.profile-picker-item-delete')) return;
          if (pid === profiles.activeId) { hideProfilePicker(); return; }
          profiles.switch(pid);
          hideProfilePicker();
          updateProfileUI();
          pages.home();
        });
      });

      // 删除按钮
      list.querySelectorAll('.profile-picker-item-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const pid = btn.dataset.del;
          const profile = profiles.getAll().find(p => p.id === pid);
          if (!profile) return;
          const confirmed = await ui.confirm({
            title: '删除孩子？',
            body: `将删除「${profile.name}」的所有学习数据，此操作不可撤销。`,
            confirmText: '删除',
            danger: true
          });
          if (!confirmed) return;
          profiles.remove(pid);
          showProfilePicker();
          updateProfileUI();
          pages.home();
        });
      });

      backdrop.classList.add('show');
    }

    function hideProfilePicker() {
      document.getElementById('profile-picker').classList.remove('show');
    }

    async function handleAddProfile() {
      const backdrop = document.getElementById('profile-picker');
      // 使用 modal 输入名字
      const modal = document.getElementById('modal');
      modal.innerHTML = `
        <div class="modal-title">添加孩子</div>
        <div class="modal-body">给孩子取个名字吧~</div>
        <input type="text" class="modal-input" id="new-profile-name" placeholder="输入名字" maxlength="10" autofocus>
        <div style="display:flex;gap:var(--space-sm);margin-bottom:var(--space-md)">
          ${['👦', '👧', '👶', '🧒', '🐱', '🐶', '🦊', '🐼'].map(a => `
            <button class="avatar-opt ${a === '👦' ? 'selected' : ''}" data-avatar="${a}" style="flex:1;padding:8px;border-radius:var(--radius-md);font-size:24px;background:var(--color-bg);border:2px solid ${a === '👦' ? 'var(--color-primary)' : 'transparent'}">${a}</button>
          `).join('')}
        </div>
        <div class="modal-actions">
          <button class="modal-btn ghost" id="modal-cancel">取消</button>
          <button class="modal-btn primary" id="modal-confirm">添加</button>
        </div>
      `;
      document.getElementById('modal-backdrop').classList.add('show');

      let selectedAvatar = '👦';
      document.querySelectorAll('.avatar-opt').forEach(btn => {
        btn.onclick = () => {
          document.querySelectorAll('.avatar-opt').forEach(b => { b.style.borderColor = 'transparent'; });
          btn.style.borderColor = 'var(--color-primary)';
          selectedAvatar = btn.dataset.avatar;
        };
      });

      document.getElementById('modal-cancel').onclick = () => {
        document.getElementById('modal-backdrop').classList.remove('show');
        modal.innerHTML = '';
      };
      document.getElementById('modal-confirm').onclick = () => {
        const name = document.getElementById('new-profile-name').value.trim() || '小朋友';
        profiles.create(name, selectedAvatar);
        document.getElementById('modal-backdrop').classList.remove('show');
        modal.innerHTML = '';
        hideProfilePicker();
        updateProfileUI();
        pages.home();
        ui.toast(`欢迎 ${name}！`, 'success');
      };
    }

    function updateProfileUI() {
      const active = profiles.getActive();
      if (!active) return;
      document.getElementById('home-profile-avatar').textContent = active.avatar || '👦';
      document.getElementById('home-profile-name').textContent = active.name || '小朋友';
    }

    /* =================================================================
     * 模块：boot（启动入口）
     * ================================================================= */
    function boot() {
      // 1. 初始化数据
      schema.init();
      updateProfileUI();
      audio.enabled = profiles.get('settings').sound;

      // 2. 绑定全局事件
      document.getElementById('profile-selector').onclick = showProfilePicker;
      document.getElementById('profile-picker-close').onclick = hideProfilePicker;
      document.getElementById('profile-picker-add').onclick = handleAddProfile;
      document.getElementById('icon-achievements').onclick = () => pages.achievements();
      document.getElementById('icon-parent').onclick = checkParentTap;
      document.getElementById('training-parent').onclick = checkParentTap;
      document.getElementById('training-back').onclick = () => {
        clearTrainingTimeout();
        pages.home();
      };
      document.getElementById('parent-back').onclick = () => {
        // 返回上一页面
        history.back();
      };
      document.getElementById('errors-back').onclick = () => {
        pages.home();
      };

      // 3. 键盘快捷键
      document.addEventListener('keydown', (e) => {
        if (router.current === 'training' && !state.training.locked) {
          const idx = ['1', '2', '3', '4'].indexOf(e.key);
          if (idx >= 0 && state.training.currentOptions[idx] !== undefined) {
            onOptionClick(idx, state.training.currentOptions[idx]);
          }
        }
      });

      // 4. 注册 Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js').then(reg => {
          // 监听新版本
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // 新版本已下载，提示用户
                ui.toast('新版本已下载，刷新后生效', 'success', 3000);
              }
            });
          });
        }).catch(() => {});

        // 监听来自 SW 的消息
        navigator.serviceWorker.addEventListener('message', (event) => {
          if (event.data?.type === 'NEW_VERSION') {
            ui.toast('新版本已就绪', 'success', 2000);
          }
        });
      }

      // PWA 添加到主屏幕引导（仅非 standalone 模式提示一次）
      if (!window.navigator.standalone && !matchMedia('(display-mode: standalone)').matches) {
        const pwaGuideDone = localStorage.getItem(STORAGE_PREFIX + 'pwaGuideDone');
        if (!pwaGuideDone) {
          // iOS 检测
          const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
          if (isIOS) {
            setTimeout(() => {
              const existing = document.querySelector('.pwa-guide');
              if (existing) return;
              const guide = document.createElement('div');
              guide.className = 'pwa-guide';
              guide.innerHTML = `
                <div class="pwa-guide-content">
                  <div class="pwa-guide-emoji">📱</div>
                  <div class="pwa-guide-title">添加到主屏幕</div>
                  <div class="pwa-guide-steps">
                    <div class="pwa-guide-step">1. 点击底部 <b>分享按钮</b> ⬆️</div>
                    <div class="pwa-guide-step">2. 向下滑动选择 <b>「添加到主屏幕」</b></div>
                    <div class="pwa-guide-step">3. 点击右上角 <b>「添加」</b></div>
                  </div>
                  <div class="pwa-guide-hint">添加后可离线使用，体验更好 ✨</div>
                  <button class="pwa-guide-close">我知道了</button>
                </div>
              `;
              document.body.appendChild(guide);
              guide.querySelector('.pwa-guide-close').onclick = () => {
                guide.remove();
                localStorage.setItem(STORAGE_PREFIX + 'pwaGuideDone', '1');
              };
              // 背景点击关闭
              guide.onclick = (e) => {
                if (e.target === guide) {
                  guide.remove();
                  localStorage.setItem(STORAGE_PREFIX + 'pwaGuideDone', '1');
                }
              };
            }, 2000);
          }
        }
      }

      // 5. 检查版本更新
      autoUpdate.check();

      // 6. 检测成就
      setInterval(checkAchievements, 2000);

      // 7. 渲染首页
      pages.home();
    }

    // 家长入口：连点 3 次 或 长按
    let parentTapCount = 0;
    let parentTapTimer = null;
    let parentLongPressTimer = null;
    function checkParentTap() {
      parentTapCount++;
      clearTimeout(parentTapTimer);
      parentTapTimer = setTimeout(() => {
        parentTapCount = 0;
      }, 500);

      if (parentTapCount >= 3) {
        parentTapCount = 0;
        pages.parent();
      }
    }
    function setupLongPress(el) {
      el.addEventListener('touchstart', () => {
        parentLongPressTimer = setTimeout(() => {
          pages.parent();
        }, 2000);
      });
      el.addEventListener('touchend', () => {
        clearTimeout(parentLongPressTimer);
      });
      el.addEventListener('mousedown', () => {
        parentLongPressTimer = setTimeout(() => {
          pages.parent();
        }, 2000);
      });
      el.addEventListener('mouseup', () => {
        clearTimeout(parentLongPressTimer);
      });
    }
    setupLongPress(document.getElementById('icon-parent'));
    setupLongPress(document.getElementById('training-parent'));

    // 启动
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', boot);
    } else {
      boot();
    }

  })();
  </script>
</body>
</html>
