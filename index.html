<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#5BA8E0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="口算">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.svg">
  <link rel="manifest" href="./manifest.json">
  <title>口算小达人</title>
  <style>
    /* ============================================== */
    /* CSS Variables                                  */
    /* ============================================== */
    :root {
      --color-primary: #5BA8E0;
      --color-success: #2D8C3C;
      --color-error: #C03A2B;
      --color-warning: #FFC857;
      --color-pink: #FF9AA2;
      --color-purple: #C8A8E9;
      --color-mint: #7BD389;

      --color-text: #2C3E50;
      --color-text-sub: #7F8C8D;
      --color-bg: #FFFBF5;
      --color-bg-card: #FFFFFF;
      --color-bg-error: #FDECE9;
      --color-bg-success: #E8F8EC;
      --color-bg-warn: #FFF8E5;
      --color-border: #E8E2D5;

      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 20px;
      --radius-xl: 24px;

      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);

      --space-xs: 8px;
      --space-sm: 12px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
    }

    /* ============================================== */
    /* Reset                                          */
    /* ============================================== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 16px;
      color: var(--color-text);
      background: var(--color-bg);
      user-select: none;
      -webkit-user-select: none;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    button:disabled { cursor: not-allowed; opacity: 0.5; }

    /* ============================================== */
    /* Layout                                         */
    /* ============================================== */
    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .page { display: none; flex-direction: column; flex: 1; min-height: 0; }
    .page.active { display: flex; }

    .topbar {
      display: flex;
      align-items: center;
      padding: var(--space-md);
      gap: var(--space-sm);
      background: var(--color-bg);
      flex-shrink: 0;
    }
    .topbar-back {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: var(--color-text);
    }
    .topbar-title {
      flex: 1; font-size: 20px; font-weight: 600;
    }
    .topbar-icon {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; color: var(--color-text-sub);
    }
    .topbar-icon .badge {
      position: absolute; top: 4px; right: 4px;
      min-width: 18px; height: 18px; padding: 0 4px;
      background: var(--color-error); color: white;
      border-radius: 9px; font-size: 11px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
    }
    .topbar-icon { position: relative; }

    .topbar-profile {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px 4px 4px;
      background: var(--color-bg-card);
      border-radius: 22px;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      flex-shrink: 0;
    }
    .profile-avatar-mini {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      background: var(--color-bg);
    }
    .profile-name-mini {
      font-size: 14px; font-weight: 600;
      max-width: 48px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .profile-arrow { font-size: 10px; color: var(--color-text-sub); }

    /* Profile Picker */
    .profile-picker-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center; justify-content: center;
      z-index: 300;
      padding: var(--space-md);
    }
    .profile-picker-backdrop.show { display: flex; }
    .profile-picker {
      background: var(--color-bg-card);
      border-radius: var(--radius-xl);
      padding: var(--space-lg);
      max-width: 360px;
      width: 100%;
      box-shadow: var(--shadow-lg);
    }
    .profile-picker-header {
      display: flex; align-items: center;
      margin-bottom: var(--space-md);
    }
    .profile-picker-title {
      flex: 1; font-size: 18px; font-weight: 700;
    }
    .profile-picker-close {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--color-text-sub);
      border-radius: 50%;
    }
    .profile-picker-list {
      display: flex; flex-direction: column;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
    }
    .profile-picker-item {
      display: flex; align-items: center;
      gap: var(--space-sm);
      padding: var(--space-md);
      background: var(--color-bg);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.1s;
    }
    .profile-picker-item:active { background: var(--color-border); }
    .profile-picker-item.active { border: 2px solid var(--color-primary); }
    .profile-picker-item-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      background: var(--color-bg-card);
    }
    .profile-picker-item-info { flex: 1; }
    .profile-picker-item-name { font-size: 16px; font-weight: 600; }
    .profile-picker-item-meta { font-size: 12px; color: var(--color-text-sub); }
    .profile-picker-item-delete {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--color-error);
      opacity: 0.5;
      border-radius: 50%;
    }
    .profile-picker-item-delete:active { opacity: 1; }
    .profile-picker-add {
      width: 100%;
      padding: 12px;
      border: 2px dashed var(--color-border);
      border-radius: var(--radius-md);
      font-size: 15px; font-weight: 600;
      color: var(--color-primary);
      text-align: center;
    }

    .content {
      flex: 1; min-height: 0; overflow-y: auto;
      padding: 0 var(--space-md);
    }

    .bottombar {
      display: flex;
      gap: var(--space-xs);
      padding: var(--space-sm) var(--space-md);
      background: var(--color-bg);
      border-top: 1px solid var(--color-border);
      flex-shrink: 0;
      overflow-x: auto;
    }

    /* ============================================== */
    /* Home Page                                      */
    /* ============================================== */
    .home-header {
      text-align: center;
      padding: var(--space-lg) 0;
    }
    .home-title {
      font-size: 32px; font-weight: 700; color: var(--color-primary);
    }
    .home-subtitle {
      font-size: 16px; color: var(--color-text-sub);
      margin-top: var(--space-xs);
    }

    .level-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
    }
    @media (min-width: 768px) {
      .level-grid { grid-template-columns: 1fr 1fr; }
    }

    .level-card {
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    .level-card.locked { opacity: 0.5; }
    .level-card.passed { border: 2px solid var(--color-success); }
    .level-card-header {
      display: flex; align-items: center; gap: var(--space-sm);
    }
    .level-icon { font-size: 36px; }
    .level-name { font-size: 20px; font-weight: 600; flex: 1; }
    .level-status { font-size: 14px; color: var(--color-text-sub); }
    .level-status.passed { color: var(--color-success); }
    .level-desc { font-size: 14px; color: var(--color-text-sub); }
    .level-progress {
      height: 8px; background: var(--color-border);
      border-radius: 4px; overflow: hidden;
    }
    .level-progress-bar {
      height: 100%; background: linear-gradient(90deg, var(--color-mint), var(--color-primary));
      transition: width 0.4s ease;
    }
    .level-stats {
      display: flex; justify-content: space-between;
      font-size: 13px; color: var(--color-text-sub);
    }
    .level-stats .pending { color: var(--color-warning); font-weight: 600; }

    .level-thumbs {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: var(--space-xs);
    }
    @media (min-width: 768px) {
      .level-thumbs { grid-template-columns: repeat(6, 1fr); }
    }
    .level-thumb {
      aspect-ratio: 1;
      background: var(--color-bg-card);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-sm);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px;
      font-size: 11px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .level-thumb:active { transform: scale(0.95); }
    .level-thumb.locked { opacity: 0.4; cursor: not-allowed; }
    .level-thumb.passed { background: #E8F8EC; }
    .level-thumb-icon { font-size: 18px; }
    .level-thumb-name { color: var(--color-text-sub); }
    .level-thumb-status { font-size: 10px; color: var(--color-text-sub); }

    .errors-shortcut {
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      padding: var(--space-md);
      box-shadow: var(--shadow-sm);
      display: flex; align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
    }
    .errors-shortcut-icon { font-size: 28px; }
    .errors-shortcut-body { flex: 1; }
    .errors-shortcut-title { font-size: 16px; font-weight: 600; }
    .errors-shortcut-desc { font-size: 12px; color: var(--color-text-sub); }
    .errors-shortcut-btn {
      background: var(--color-primary); color: white;
      padding: 8px 16px; border-radius: var(--radius-md);
      font-size: 14px; font-weight: 600;
    }

    /* ============================================== */
    /* Training Page                                  */
    /* ============================================== */
    .training-progress {
      background: var(--color-bg-card);
      border-radius: var(--radius-md);
      padding: var(--space-sm) var(--space-md);
      margin: 0 var(--space-md) var(--space-md);
      box-shadow: var(--shadow-sm);
    }
    .training-progress-top {
      display: flex; justify-content: space-between;
      font-size: 13px; margin-bottom: 6px;
    }
    .training-progress-top .pending { color: var(--color-warning); }
    .training-progress-bar {
      height: 8px; background: var(--color-border);
      border-radius: 4px; overflow: hidden;
    }
    .training-progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-mint), var(--color-primary));
      transition: width 0.3s;
    }

    .timeout-bar {
      height: 6px; background: var(--color-border);
      border-radius: 3px; overflow: hidden;
      margin: 0 var(--space-md) var(--space-md);
    }
    .timeout-bar-fill {
      height: 100%; background: var(--color-primary);
      transition: width linear, background 0.2s;
    }
    .timeout-bar-fill.warn {
      background: var(--color-warning);
    }

    .expr-area {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: var(--space-md);
      min-height: 100px;
    }
    .expr {
      font-size: 80px;
      font-weight: 700;
      color: var(--color-text);
      text-align: center;
      letter-spacing: 0.05em;
    }
    @media (orientation: landscape) {
      .expr { font-size: 110px; }
    }
    @media (max-width: 500px) {
      .expr { font-size: 60px; }
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
      padding: var(--space-md);
    }
    @media (orientation: landscape) {
      .options { grid-template-columns: repeat(4, 1fr); }
    }

    .option {
      min-height: 100px;
      background: var(--color-bg-card);
      border: 3px solid var(--color-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      font-size: 48px;
      font-weight: 700;
      color: var(--color-text);
      transition: all 0.15s ease;
      display: flex; align-items: center; justify-content: center;
    }
    @media (min-width: 1024px) {
      .option { min-height: 120px; font-size: 56px; }
    }
    .option:active:not(:disabled) {
      transform: scale(0.96);
    }
    .option.correct {
      background: var(--color-bg-success);
      border-color: var(--color-success);
      color: var(--color-success);
    }
    .option.wrong {
      background: var(--color-bg-error);
      border-color: var(--color-error);
      color: var(--color-error);
    }
    .option.timeout-warn {
      border-color: var(--color-warning);
      background: var(--color-bg-warn);
    }
    .option.dimmed { opacity: 0.4; }
    .option.eliminated {
      opacity: 0.25;
      background: var(--color-bg-error);
      border-color: var(--color-error);
    }

    @keyframes correctPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    @keyframes wrongShake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-10px); }
      40%, 80% { transform: translateX(10px); }
    }
    @keyframes optionPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    /* ============================================== */
    /* Bottom Bar (Level Switch)                      */
    /* ============================================== */
    .level-btn {
      flex: 1;
      min-width: 60px;
      min-height: 56px;
      padding: 6px 8px;
      background: var(--color-bg-card);
      border-radius: var(--radius-sm);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px;
      font-size: 11px;
      color: var(--color-text);
      transition: all 0.1s;
    }
    .level-btn.locked { opacity: 0.4; }
    .level-btn.active { background: var(--color-primary); color: white; }
    .level-btn.passed { border: 2px solid var(--color-success); }
    .level-btn-icon { font-size: 20px; }

    /* ============================================== */
    /* Toast / Feedback                               */
    /* ============================================== */
    .toast {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85);
      color: white;
      padding: var(--space-md) var(--space-lg);
      border-radius: var(--radius-lg);
      font-size: 20px;
      font-weight: 600;
      z-index: 200;
      pointer-events: none;
    }
    .toast.success { background: var(--color-success); }
    .toast.error { background: var(--color-error); }
    .toast.warn { background: var(--color-warning); color: var(--color-text); }

    /* ============================================== */
    /* Modal                                          */
    /* ============================================== */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center; justify-content: center;
      z-index: 300;
      padding: var(--space-md);
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      background: var(--color-bg-card);
      border-radius: var(--radius-xl);
      padding: var(--space-lg);
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow-lg);
    }
    .modal-title {
      font-size: 20px; font-weight: 700;
      margin-bottom: var(--space-sm);
    }
    .modal-body {
      font-size: 15px; color: var(--color-text-sub);
      margin-bottom: var(--space-lg);
      line-height: 1.5;
    }
    .modal-actions {
      display: flex; gap: var(--space-sm);
    }
    .modal-btn {
      flex: 1;
      padding: 12px;
      border-radius: var(--radius-md);
      font-size: 16px; font-weight: 600;
    }
    .modal-btn.primary { background: var(--color-primary); color: white; }
    .modal-btn.danger { background: var(--color-error); color: white; }
    .modal-btn.ghost {
      background: var(--color-bg);
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }
    .modal-input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 2px solid var(--color-border);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-md);
      font-family: inherit;
    }
    .modal-input:focus { outline: none; border-color: var(--color-primary); }

    /* ============================================== */
    /* Parent Panel                                   */
    /* ============================================== */
    .panel-section {
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      padding: var(--space-md);
      margin-bottom: var(--space-md);
      box-shadow: var(--shadow-sm);
    }
    .panel-section-title {
      font-size: 16px; font-weight: 700;
      margin-bottom: var(--space-sm);
      display: flex; align-items: center; gap: var(--space-xs);
    }
    .panel-row {
      display: flex; justify-content: space-between;
      align-items: center;
      padding: var(--space-sm) 0;
      border-bottom: 1px solid var(--color-border);
    }
    .panel-row:last-child { border-bottom: none; }
    .panel-row-label { font-size: 14px; }
    .panel-row-value { font-size: 14px; color: var(--color-text-sub); }
    .panel-row select, .panel-row input[type="text"] {
      padding: 6px 12px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
    }
    .panel-btn {
      padding: 8px 16px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      background: var(--color-primary);
      color: white;
    }
    .panel-btn.danger { background: var(--color-error); }
    .panel-btn.ghost {
      background: var(--color-bg);
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }
    .panel-error-item {
      display: flex; align-items: center; gap: var(--space-sm);
      padding: var(--space-sm) 0;
      border-bottom: 1px solid var(--color-border);
      font-size: 14px;
    }
    .panel-error-item:last-child { border-bottom: none; }
    .panel-error-item .expr { font-size: 16px; font-weight: 600; flex: 1; }
    .panel-error-item .meta { font-size: 12px; color: var(--color-text-sub); }
    .panel-error-item.mastered { opacity: 0.6; }
    .panel-error-item.mastered .meta { color: var(--color-success); }

    .panel-bar-chart {
      display: flex;
      align-items: flex-end;
      gap: var(--space-xs);
      height: 80px;
      padding: var(--space-sm) 0;
    }
    .panel-bar-day {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .panel-bar-fill {
      width: 100%;
      background: linear-gradient(180deg, var(--color-mint), var(--color-primary));
      border-radius: 4px 4px 0 0;
      min-height: 2px;
      transition: height 0.3s;
    }
    .panel-bar-label { font-size: 11px; color: var(--color-text-sub); }

    /* ============================================== */
    /* Errors Page                                    */
    /* ============================================== */
    .tab-bar {
      display: flex;
      gap: var(--space-xs);
      padding: 0 var(--space-md);
      margin-bottom: var(--space-md);
    }
    .tab {
      flex: 1;
      padding: 10px 12px;
      background: var(--color-bg-card);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      color: var(--color-text-sub);
      box-shadow: var(--shadow-sm);
    }
    .tab.active {
      background: var(--color-primary);
      color: white;
    }

    .errors-info {
      background: var(--color-bg-warn);
      border-radius: var(--radius-md);
      padding: var(--space-sm) var(--space-md);
      margin: 0 var(--space-md) var(--space-md);
      font-size: 13px;
      color: var(--color-text);
    }

    .error-item {
      background: var(--color-bg-card);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      margin-bottom: var(--space-sm);
      box-shadow: var(--shadow-sm);
    }
    .error-item .expr { font-size: 20px; font-weight: 600; }
    .error-item .meta {
      font-size: 12px; color: var(--color-text-sub);
      margin-top: 4px;
    }

    .empty-state {
      text-align: center;
      padding: var(--space-xl) var(--space-md);
      color: var(--color-text-sub);
    }
    .empty-state .emoji { font-size: 48px; margin-bottom: var(--space-sm); }
    .empty-state .msg { font-size: 16px; }

    /* ============================================== */
    /* Buttons                                        */
    /* ============================================== */
    .btn {
      padding: 12px 24px;
      border-radius: var(--radius-md);
      font-size: 16px;
      font-weight: 600;
      transition: all 0.1s;
    }
    .btn:active:not(:disabled) { transform: scale(0.96); }
    .btn-primary { background: var(--color-primary); color: white; }
    .btn-success { background: var(--color-success); color: white; }
    .btn-danger { background: var(--color-error); color: white; }
    .btn-ghost {
      background: var(--color-bg-card);
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }

    /* ============================================== */
    /* Celebration                                    */
    /* ============================================== */
    .celebration {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center; justify-content: center;
      z-index: 400;
      flex-direction: column;
    }
    .celebration.show { display: flex; }
    .celebration .emoji { font-size: 100px; }
    .celebration .title {
      color: white; font-size: 32px; font-weight: 700;
      margin-top: var(--space-md);
    }
    .celebration .subtitle {
      color: white; font-size: 18px;
      margin-top: var(--space-sm);
    }
    .celebration .btn {
      margin-top: var(--space-lg);
    }

    /* Confetti */
    .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 350; overflow: hidden; }
    .confetti {
      position: absolute; width: 10px; height: 10px;
      animation: confetti-fall 2s ease-out forwards;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-100px) rotate(0); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* ============================================== */
    /* Update Banner                                  */
    /* ============================================== */
    .update-banner {
      display: none;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      background: linear-gradient(135deg, #5BA8E0, #7BD389);
      color: white;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .update-banner-msg { flex: 1; }
    .update-banner-btn {
      padding: 6px 16px;
      background: white;
      color: var(--color-primary);
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 700;
    }
    .update-banner-later {
      padding: 6px 12px;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
    }

    /* ============================================== */
    /* PWA Install Guide                              */
    /* ============================================== */
    .pwa-guide {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 400;
      padding: var(--space-md);
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .pwa-guide-content {
      background: var(--color-bg-card);
      border-radius: var(--radius-xl);
      padding: var(--space-xl);
      max-width: 340px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .pwa-guide-emoji { font-size: 48px; margin-bottom: var(--space-sm); }
    .pwa-guide-title { font-size: 20px; font-weight: 700; margin-bottom: var(--space-md); }
    .pwa-guide-steps { text-align: left; margin-bottom: var(--space-md); }
    .pwa-guide-step {
      padding: 8px 0;
      font-size: 15px;
      line-height: 1.5;
      color: var(--color-text);
    }
    .pwa-guide-step b { color: var(--color-primary); }
    .pwa-guide-hint {
      font-size: 13px;
      color: var(--color-text-sub);
      margin-bottom: var(--space-md);
    }
    .pwa-guide-close {
      width: 100%;
      padding: 12px;
      background: var(--color-primary);
      color: white;
      border-radius: var(--radius-md);
      font-size: 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- Update Banner -->
    <div class="update-banner" id="update-banner">
      <span class="update-banner-msg">新版本可用</span>

    <!-- Home Page -->

      <div class="tab-bar">

        💡 这些题会在你继续练习时自动重出

  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Modal -->

  </div>

  <!-- Celebration -->
  <div class="celebration" id="celebration">
    <div class="emoji" id="celebration-emoji">🎉</div>
    <div class="title" id="celebration-title">通关啦！</div>
    <div class="subtitle" id="celebration-subtitle"></div>
    <button class="btn btn-primary" id="celebration-btn">继续</button>
  </div>

  <!-- Confetti container -->
  <div class="confetti-container" id="confetti"></div>

  <!-- Profile Picker -->
  <div class="profile-picker-backdrop" id="profile-picker">
    <div class="profile-picker">
      <div class="profile-picker-header">
        <div class="profile-picker-title">切换孩子</div>
        <button class="profile-picker-close" id="profile-picker-close">✕</button>
      </div>
      <div class="profile-picker-list" id="profile-picker-list"></div>
      <button class="profile-picker-add" id="profile-picker-add">＋ 添加孩子</button>
    </div>
  </div>

  <script>
  /* =================================================================
   * 口算小达人 - 单文件应用
   * 命名空间：window.hx
   * ================================================================= */
  (function() {
    'use strict';

    const STORAGE_PREFIX = 'hx.';
    const SCHEMA_VERSION = 4;
    const APP_VERSION = '1.1.0';

    /* =================================================================
     * 模块：autoUpdate（GitHub 版本检查 + 自动更新）
     * ================================================================= */
    const autoUpdate = {
      // 用户需将其改为自己的 GitHub 仓库
      GITHUB_REPO: 'ybid/haoxue',
      get GITHUB_API() {
        return `https://api.github.com/repos/${this.GITHUB_REPO}/releases/latest`;
      },
      get tagUrl() {
        return `https://github.com/${this.GITHUB_REPO}/releases/latest`;
      },

      async check() {
        // 只有发布到远程时才检查
        if (this.GITHUB_REPO === 'YourName/haoxue') return;
        const info = this.getInfo();
        // 每小时最多检查一次
        if (info.checkedAt && Date.now() - info.checkedAt < 3600000) return;
        try {
          const resp = await fetch(this.GITHUB_API, { signal: AbortSignal.timeout(5000) });
          if (!resp.ok) return;
          const release = await resp.json();
          const latestVer = (release.tag_name || '').replace(/^v/, '');
          if (latestVer && latestVer > APP_VERSION) {
            info.latestVersion = latestVer;
            info.latestReleaseUrl = release.html_url || this.tagUrl;
            info.checkedAt = Date.now();
            this.saveInfo(info);
            this.showBanner(latestVer);
          }
        } catch (e) {
          // 网络不可用 / GitHub 限流 —— 静默失败
        }
      },

      getInfo() {
        try {
          const raw = localStorage.getItem(STORAGE_PREFIX + 'versionInfo');
          return raw ? JSON.parse(raw) : { currentVersion: APP_VERSION, checkedAt: null, latestVersion: null, latestReleaseUrl: null };
        } catch { return { currentVersion: APP_VERSION, checkedAt: null, latestVersion: null, latestReleaseUrl: null }; }
      },

      saveInfo(info) {
        try { localStorage.setItem(STORAGE_PREFIX + 'versionInfo', JSON.stringify(info)); } catch {}
      },

      showBanner(version) {
        const el = document.getElementById('update-banner');
        if (!el) return;
        const msg = el.querySelector('.update-banner-msg');
        if (msg) msg.textContent = `新版本 v${version} 可用`;
        el.style.display = 'flex';

        // 更新按钮
        const updateBtn = el.querySelector('.update-banner-btn');
        if (updateBtn) {
          updateBtn.onclick = () => {
            // 打开 Release 页面
            const info = this.getInfo();
            if (info.latestReleaseUrl) {
              window.open(info.latestReleaseUrl, '_blank');
            }
          };
        }

        // 稍后提醒
        const laterBtn = el.querySelector('.update-banner-later');
        if (laterBtn) {
          laterBtn.onclick = () => {
            el.style.display = 'none';
          };
        }
      }
    };

    /* =================================================================
     * 模块：utils
     * ================================================================= */
    const utils = {};

    utils.randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    utils.randFloat = () => Math.random();
    utils.pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
    utils.shuffle = (arr) => {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    };
    utils.formatTime = (ms) => {
      const sec = Math.floor(ms / 1000);
      if (sec < 60) return sec + '秒';
      const min = Math.floor(sec / 60);
      const s = sec % 60;
      return min + '分' + s + '秒';
    };
    utils.formatDate = (ts) => {
      const d = new Date(ts);
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${d.getFullYear()}-${m}-${day}`;
    };
    utils.escapeHtml = (s) => String(s).replace(/[<>&"']/g, c =>
      ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
    // 格式化算式用于显示（在算子两边加空格）
    utils.formatExprForDisplay = (expr) => expr.replace(/([+\-×÷])/g, ' $1 ');

    /* =================================================================
     * 模块：store（localStorage 封装）
     * ================================================================= */
    const store = {
      cache: {},
      get(key, defaultVal) {
        if (key in this.cache) return this.cache[key];
        try {
          const raw = localStorage.getItem(key);
          if (raw === null) {
            this.cache[key] = defaultVal;
            return defaultVal;
          }
          this.cache[key] = JSON.parse(raw);
          return this.cache[key];
        } catch (e) {
          console.warn('store.get failed', key, e);
          this.cache[key] = defaultVal;
          return defaultVal;
        }
      },
      set(key, val) {
        try {
          this.cache[key] = val;
          localStorage.setItem(key, JSON.stringify(val));
          return true;
        } catch (e) {
          console.warn('store.set failed', key, e);
          if (e.name === 'QuotaExceededError') {
            this.cleanupOldErrors();
            try {
              localStorage.setItem(key, JSON.stringify(val));
              this.cache[key] = val;
              return true;
            } catch (e2) {
              return false;
            }
          }
          return false;
        }
      },
      remove(key) {
        delete this.cache[key];
        localStorage.removeItem(key);
      },
      clearAll() {
        Object.keys(localStorage)
          .filter(k => k.startsWith(STORAGE_PREFIX))
          .forEach(k => localStorage.removeItem(k));
        this.cache = {};
      },
      // ---- 全局数据（不加 profile 前缀） ----
      getGlobal(key, defaultVal) { return this.get(STORAGE_PREFIX + key, defaultVal); },
      setGlobal(key, val) { return this.set(STORAGE_PREFIX + key, val); },
      removeGlobal(key) { this.remove(STORAGE_PREFIX + key); },
      // ---- Profile 作用域数据 ----
      getForProfile(pid, key, defaultVal) { return this.get(this._profileKey(pid, key), defaultVal); },
      setForProfile(pid, key, val) { return this.set(this._profileKey(pid, key), val); },
      removeForProfile(pid, key) { this.remove(this._profileKey(pid, key)); },
      _profileKey(pid, key) { return `${STORAGE_PREFIX}${pid}.${key}`; },
      // ---- 检查旧版数据是否存在（用于迁移） ----
      hasOldData() { return localStorage.getItem(STORAGE_PREFIX + 'mastery') !== null; },
      cleanupOldErrors() {
        // 遍历所有 profile 清理最旧的已掌握题
        const profileList = store.getGlobal('profiles');
        const pids = profileList?.list?.map(p => p.id) || [];
        // 如果 profiles 未初始化，尝试当前 activeId
        const ids = pids.length > 0 ? pids : (profiles.activeId ? [profiles.activeId] : []);
        ids.forEach(pid => {
          const mastery = store.getForProfile(pid, 'mastery');
          if (!mastery?.byLevel) return;
          Object.values(mastery.byLevel).forEach(level => {
            const mastered = Object.entries(level.questions || {})
              .filter(([_, q]) => q.status === 'mastered')
              .sort((a, b) => (a[1].firstCorrectAt || 0) - (b[1].firstCorrectAt || 0));
            if (mastered.length > 50) {
              mastered.slice(0, mastered.length - 50).forEach(([expr]) => {
                delete level.questions[expr];
                level.stats.mastered = Math.max(0, (level.stats.mastered || 0) - 1);
              });
            }
          });
          store.setForProfile(pid, 'mastery', mastery);
        });
      }
    };

    /* =================================================================
     * 模块：schema（默认数据）
     * ================================================================= */
    const schema = {
      defaults: {
        'hx.profile': () => ({
          schemaVer: SCHEMA_VERSION,
          createdAt: Date.now(),
          lastActiveAt: Date.now(),
          totalActiveMs: 0,
          appVersion: APP_VERSION
        }),
        'hx.settings': () => ({
          schemaVer: SCHEMA_VERSION,
          sound: true,
          motion: true,
          fontSize: 'normal',
          timeoutSecByType: { single: 5, double: 10 },
          timeoutWarnSec: 3,
          cooldownMinutes: 5,
          cooldownThreshold: 5,
          challengeDurationSec: 60
        }),
        'hx.progress': () => ({
          schemaVer: SCHEMA_VERSION,
          levels: {}
        }),
        'hx.mastery': () => ({
          schemaVer: SCHEMA_VERSION,
          byLevel: {}
        }),
        'hx.errorSets': () => ({
          schemaVer: SCHEMA_VERSION,
          byLevel: {}
        }),
        'hx.errors': () => ({
          schemaVer: SCHEMA_VERSION,
          items: []
        }),
        'hx.achievements': () => ({
          schemaVer: SCHEMA_VERSION,
          unlocked: [],
          totalUnlocked: 0
        }),
        'hx.challenges': () => ({
          schemaVer: SCHEMA_VERSION,
          byLevel: {}
        }),
        'hx.daily': () => ({
          schemaVer: SCHEMA_VERSION,
          byDate: {}
        })
      },
      init() {
        // ---- v3 → v4 迁移：将旧全局数据迁移到 profile 作用域 ----
        if (store.hasOldData()) {
          this._migrateV3toV4();
        } else {
          // 确保所有 key 存在（仅在全新安装时）
          Object.entries(this.defaults).forEach(([key, factory]) => {
            if (store.get(key) === undefined || store.get(key) === null) {
              store.set(key, factory());
            }
          });
          // 更新 schemaVer
          const profile = store.get('hx.profile');
          if (profile) {
            profile.schemaVer = SCHEMA_VERSION;
            store.set('hx.profile', profile);
          }
        }
        // 初始化 profiles（创建默认或加载已有）
        profiles.init();
        // 更新活跃时间
        this.touchActive();
      },
      _migrateV3toV4() {
        const oldKeys = ['profile', 'settings', 'progress', 'mastery', 'errorSets', 'errors', 'achievements', 'challenges', 'daily'];
        const defaultId = 'p_migrated_' + Date.now().toString(36);
        // 创建 profiles 列表
        const list = {
          schemaVer: SCHEMA_VERSION,
          activeProfileId: defaultId,
          list: [{
            id: defaultId, name: '小朋友', avatar: '👦',
            createdAt: Date.now(), lastActiveAt: Date.now()
          }]
        };
        store.setGlobal('profiles', list);
        profiles.activeId = defaultId;
        // 迁移旧数据
        oldKeys.forEach(k => {
          const val = store.get(STORAGE_PREFIX + k);
          if (val !== undefined && val !== null) {
            store.setForProfile(defaultId, k, val);
          }
          store.remove(STORAGE_PREFIX + k);
        });
        // 确保不缺失任何 key
        profiles._initProfileData(defaultId);
        console.log('[schema] v3→v4 迁移完成，已创建默认孩子档案');
      },
      touchActive() {
        if (!profiles.activeId) return;
        const p = profiles.get('profile');
        if (p) {
          p.lastActiveAt = Date.now();
          profiles.set('profile', p);
        }
      },
      addActiveTime(ms) {
        if (!profiles.activeId) return;
        const p = profiles.get('profile');
        if (p) {
          p.totalActiveMs = (p.totalActiveMs || 0) + ms;
          profiles.set('profile', p);
        }
        // 当日时长
        const daily = profiles.get('daily');
        const today = utils.formatDate(Date.now());
        if (!daily.byDate[today]) {
          daily.byDate[today] = { activeMs: 0, sessions: 0, questions: 0, firstCorrect: 0 };
        }
        daily.byDate[today].activeMs += ms;
        if (!daily.byDate[today]._sessionStarted) {
          daily.byDate[today].sessions = (daily.byDate[today].sessions || 0) + 1;
          daily.byDate[today]._sessionStarted = true;
          setTimeout(() => {
            const d = profiles.get('daily');
            if (d.byDate[today]) delete d.byDate[today]._sessionStarted;
            profiles.set('daily', d);
          }, 30000);
        }
        profiles.set('daily', daily);
      }
    };

    /* =================================================================
     * 模块：profiles（多孩子档案管理）
     * ================================================================= */
    const profiles = {
      activeId: null,

      // 初始化：获取或创建 profiles 列表
      init() {
        const list = store.getGlobal('profiles');
        if (!list || !list.list || list.list.length === 0) {
          return this._createDefault();
        }
        this.activeId = list.activeProfileId || list.list[0].id;
        return list;
      },

      // 获取所有 profiles
      getAll() {
        return (store.getGlobal('profiles') || { list: [] }).list;
      },

      // 获取当前活跃 profile
      getActive() {
        const list = store.getGlobal('profiles');
        if (!list || !this.activeId) return null;
        return list.list.find(p => p.id === this.activeId) || list.list[0] || null;
      },

      // 创建新孩子
      create(name, avatar) {
        const list = store.getGlobal('profiles');
        if (!list) return null;
        const id = 'p_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
        const profile = { id, name, avatar: avatar || '👦', createdAt: Date.now(), lastActiveAt: Date.now() };
        list.list.push(profile);
        list.activeProfileId = id;
        this.activeId = id;
        store.setGlobal('profiles', list);
        this._initProfileData(id);
        return profile;
      },

      // 切换活跃孩子
      switch(id) {
        const list = store.getGlobal('profiles');
        if (!list) return false;
        const found = list.list.find(p => p.id === id);
        if (!found) return false;
        list.activeProfileId = id;
        this.activeId = id;
        store.setGlobal('profiles', list);
        return true;
      },

      // 删除孩子（需要确认）
      remove(id) {
        const list = store.getGlobal('profiles');
        if (!list || list.list.length <= 1) return false;
        const idx = list.list.findIndex(p => p.id === id);
        if (idx === -1) return false;
        list.list.splice(idx, 1);
        if (list.activeProfileId === id) {
          list.activeProfileId = list.list[0].id;
          this.activeId = list.list[0].id;
        }
        store.setGlobal('profiles', list);
        // 清理该孩子的所有数据
        Object.keys(localStorage)
          .filter(k => k.startsWith(STORAGE_PREFIX + id + '.'))
          .forEach(k => {
            delete store.cache[k];
            localStorage.removeItem(k);
          });
        return true;
      },

      // ---- 作用域数据读写 ----
      get(key, defaultVal) {
        if (!this.activeId) return defaultVal;
        return store.getForProfile(this.activeId, key, defaultVal);
      },
      set(key, val) {
        if (!this.activeId) return false;
        return store.setForProfile(this.activeId, key, val);
      },
      remove(key) {

      // ---- 只读其它孩子的数据 ----

      // ---- 内部 ----
      _createDefault() {
        const id = 'p_default_' + Date.now().toString(36);
        const list = {
          schemaVer: SCHEMA_VERSION,
          activeProfileId: id,

      _initProfileData(pid) {

          ['profile', { schemaVer: SCHEMA_VERSION, createdAt: Date.now(), lastActiveAt: Date.now(), totalActiveMs: 0, appVersion: APP_VERSION }],
          ['settings', { schemaVer: SCHEMA_VERSION, sound: true, motion: true, fontSize: 'normal', timeoutSecByType: { single: 5, double: 10 }, timeoutWarnSec: 3, cooldownMinutes: 5, cooldownThreshold: 5, challengeDurationSec: 60 }],

    };

    /* =================================================================
     * 模块：levels（关卡配置）
     * ================================================================= */
    // ============================================================
    // 12 关卡体系（按教学关键子集全覆盖）
    // ============================================================
    // "coverageSet" 为 null 表示覆盖题库所有可能算式（即全覆盖）
    // 否则列出必须掌握的关键算式列表
    // ============================================================
    function generateFullCoverageSet(operators, range, filter) {
      // 生成某个操作符+范围下的"所有可能算式"列表
      const set = [];
      const isAdd = operators.includes('+');
      const isSub = operators.includes('-');

      if (isAdd && !isSub) {
        // 纯加法
        for (let a = range.a[0]; a <= range.a[1]; a++) {
          for (let b = range.b[0]; b <= range.b[1]; b++) {
            if (filter?.type === 'carry' && ((a % 10) + (b % 10) < 10)) continue;
            if (filter?.type === 'noCarry' && ((a % 10) + (b % 10) >= 10)) continue;
            set.push(`${a}+${b}`);
          }
        }
      } else if (isSub && !isAdd) {
        // 纯减法
        for (let a = range.a[0]; a <= range.a[1]; a++) {
          for (let b = range.b[0]; b <= range.b[1]; b++) {
            if (a < b) continue;
            if (filter?.type === 'borrow' && ((a % 10) >= (b % 10))) continue;
            if (filter?.type === 'noBorrow' && ((a % 10) < (b % 10))) continue;
            set.push(`${a}-${b}`);
          }
        }
      } else {
        // 混合
        for (let a = range.a[0]; a <= range.a[1]; a++) {
          for (let b = range.b[0]; b <= range.b[1]; b++) {
            if (isAdd) set.push(`${a}+${b}`);
            if (isSub && a >= b) set.push(`${a}-${b}`);
          }
        }
      }
      return set;
    }

    // 一位数加减关键题（全部可能算式）
    const singleDigitAddAll = generateFullCoverageSet(['+'], { a: [0, 9], b: [0, 9] });  // 100 题
    const singleDigitSubAll = generateFullCoverageSet(['-'], { a: [0, 9], b: [0, 9] });  // 55 题
    const tableMulAll = generateFullCoverageSet(['×'], { a: [1, 9], b: [1, 9] });        // 81 题
    const tableDivAll = [];  // 1~9 除法，每商 1\~9 × 除数 1\~9 = 81 题
    for (let q = 1; q <= 9; q++) {
      for (let b = 1; b <= 9; b++) {
        tableDivAll.push(`${b * q}÷${b}`);
      }
    }

    // 两位数加减：精选关键题（避免题库过大）
    // 策略：个位 + 个位的所有进位/不退位组合 × 多个十位
    function generateTwoDigitKeySet(op) {
      const set = [];
      // 关键十位数：[10, 20, 30, ..., 90] - 9 种
      const tens = [10, 20, 30, 40, 50, 60, 70, 80, 90];
      // 一个个位数 + 个位数 = 100 种组合
      for (const t of tens) {
        for (let u1 = 0; u1 <= 9; u1++) {
          for (let u2 = 0; u2 <= 9; u2++) {
            const a = t + u1;
            const b = op === '+' ? u2 : u1;  // 减法：a 的个位是 u1, b 的个位是 u2
            if (op === '+') {
              // 十位相同（不进位时），或十位差 1（进位时）
              set.push(`${a}+${b}`);
            } else {
              if (a >= b) {
                set.push(`${a}-${b}`);
              }
            }
          }
        }
      }
      // 去重并截取合理大小
      return [...new Set(set)];
    }
    // 两位数 + 两位数：选 36 道典型（个位 × 个位的进位/不进位 × 多个十位）
    const twoDigitAddSet = (() => {
      const set = new Set();
      const tens = [11, 23, 35, 47, 58, 69];  // 6 种典型十位
      for (const a of tens) {
        for (let u1 = 0; u1 <= 9; u1++) {
          for (let u2 = 0; u2 <= 9; u2++) {
            const aa = a + u1;
            const bb = a + u2;  // 两位数典型：两个数十位相同
            if (aa <= 99 && bb <= 99) set.add(`${aa}+${bb}`);
          }
        }
      }
      return [...set];  // ~324 道
    })();
    // 两位数 - 两位数：选 36 道典型
    const twoDigitSubSet = (() => {
      const set = new Set();
      const tens = [11, 23, 35, 47, 58, 69];
      for (const a of tens) {
        for (let u1 = 0; u1 <= 9; u1++) {
          for (let u2 = 0; u2 <= 9; u2++) {
            const aa = a + u1;
            const bb = a + u2;
            if (aa > bb) set.add(`${aa}-${bb}`);
          }
        }
      }
      return [...set];  // ~270 道
    })();

    const LEVELS = [
      // ===== 一位数阶段 =====
      {

      },
      {
        id: 2, name: '一位数减法', icon: '🍌', desc: '10 以内的减法（全覆盖）',
        operators: ['-'], range: { a: [0, 9], b: [0, 9] },
        filter: { type: 'mixed' }, timeoutSec: 5,
        coverageSet: singleDigitSubAll  // 55 道全覆盖
      },

      // ===== 表内乘除法 =====
      {
        id: 3, name: '表内乘法', icon: '🎲', desc: '1\~9 乘法表（全覆盖）',
        operators: ['×'], range: { a: [1, 9], b: [1, 9] },
        filter: { type: 'mixed' }, timeoutSec: 10,
        coverageSet: tableMulAll  // 81 道全覆盖
      },
      {
        id: 4, name: '表内除法', icon: '🍰', desc: '表内整除（全覆盖）',
        operators: ['÷'], range: { a: [1, 81], b: [1, 9] },
        filter: { type: 'exact' }, timeoutSec: 10,
        coverageSet: tableDivAll  // 81 道全覆盖
      },

      // ===== 一位+两位混合 =====
      {

        operators: ['+'], range: { a: [10, 99], b: [10, 99] },

      // ===== 混合 =====
      {

        operators: ['+', '-'], range: { a: [0, 9], b: [0, 9] },

      {

        operators: ['+', '-'], range: { a: [10, 99], b: [10, 99] },

      },

      {

        filter: { type: 'mixed' }, timeoutSec: 10,

      },
      {

      },

        coverageSet: null
      }
    ];

    const levels = {
      getAll() { return LEVELS; },
      get(id) { return LEVELS.find(l => l.id === id); },
      isUnlocked(id) {
        if (id === 1) return true;
        // 第 N 关需第 N-1 关通过
        const progress = profiles.get('progress');
        const prevId = id - 1;
        return !!(progress.levels[prevId] && progress.levels[prevId].passed);
      }
    };

    /* =================================================================
     * 模块：generator（题库生成器）
     * ================================================================= */
    const generator = {};

    function isCarry(a, b) {
      return (a % 10) + (b % 10) >= 10;
    }
    function isBorrow(a, b) {
      return (a % 10) < (b % 10);
    }

    generator.genAddition = function(config, op) {
      for (let i = 0; i < 100; i++) {
        let a, b;
        if (op === '+') {
          a = utils.randInt(config.range.a[0], config.range.a[1]);
          b = utils.randInt(config.range.b[0], config.range.b[1]);
        } else {
          const sub = config.range.add;
          a = utils.randInt(sub.a[0], sub.a[1]);
          b = utils.randInt(sub.b[0], sub.b[1]);
        }
        if (config.filter?.type === 'carry' && !isCarry(a, b)) continue;
        if (config.filter?.type === 'noCarry' && isCarry(a, b)) continue;
        return { a, op: '+', b, answer: a + b, expr: `${a}+${b}` };
      }
      // 兜底
      const a = utils.randInt(config.range.a[0], config.range.a[1]);
      const b = utils.randInt(config.range.b[0], config.range.b[1]);
      return { a, op: '+', b, answer: a + b, expr: `${a}+${b}` };
    };

    generator.genSubtraction = function(config, op) {
      for (let i = 0; i < 100; i++) {
        let a, b;
        if (op === '-') {
          const sub = config.range.sub || config.range;
          a = utils.randInt(sub.a[0], sub.a[1]);
          b = utils.randInt(sub.b[0], sub.b[1]);
        } else {
          a = utils.randInt(config.range.a[0], config.range.a[1]);
          b = utils.randInt(config.range.b[0], config.range.b[1]);
        }
        if (a < b) continue;
        if (config.filter?.type === 'borrow' && !isBorrow(a, b)) continue;
        if (config.filter?.type === 'noBorrow' && isBorrow(a, b)) continue;
        return { a, op: '-', b, answer: a - b, expr: `${a}-${b}` };
      }
      const a = utils.randInt(20, 99);
      const b = utils.randInt(1, 9);
      return { a, op: '-', b: Math.min(a, b), answer: a - b, expr: `${a}-${b}` };
    };

    generator.genMultiplication = function(config) {
      for (let i = 0; i < 50; i++) {
        const a = utils.randInt(1, 9);
        const b = utils.randInt(1, 9);
        return { a, op: '×', b, answer: a * b, expr: `${a}×${b}` };
      }
      return { a: 2, op: '×', b: 3, answer: 6, expr: '2×3' };
    };

    generator.genDivision = function(config) {
      for (let i = 0; i < 100; i++) {
        const b = utils.randInt(1, 9);
        const q = utils.randInt(1, 9);
        const a = b * q;
        if (a < 1 || a > 81) continue;
        return { a, op: '÷', b, answer: q, expr: `${a}÷${b}` };
      }
      return { a: 6, op: '÷', b: 2, answer: 3, expr: '6÷2' };
    };

    generator.generateByExpr = function(expr, config) {
      // 从算式字符串解析（用于错集重出）
      const m = expr.match(/^(\d+)\s*([+\-×÷])\s*(\d+)$/);
      if (!m) return generator.generate(config);
      const a = parseInt(m[1]);
      const op = m[2];
      const b = parseInt(m[3]);
      const answer = op === '+' ? a + b :
                     op === '-' ? a - b :
                     op === '×' ? a * b :
                     Math.floor(a / b);
      return { a, op, b, answer, expr };
    };

    generator.generate = function(config) {
      const op = config.operators.length === 1
        ? config.operators[0]
        : utils.pick(config.operators);

      if (op === '+') return generator.genAddition(config, '+');
      if (op === '-') return generator.genSubtraction(config, '-');
      if (op === '×') return generator.genMultiplication(config);
      if (op === '÷') return generator.genDivision(config);
      return generator.genAddition(config, '+');
    };

    generator.generateOptions = function(correctAnswer, expr) {
      const options = new Set([correctAnswer]);
      const op = expr.match(/([+\-×÷])/)?.[1];
      const isMulDiv = op === '×' || op === '÷';

      // 多种干扰项生成策略
      const strategies = [
        () => correctAnswer + utils.randInt(1, 3),
        () => correctAnswer - utils.randInt(1, 3),
        () => correctAnswer + (utils.randFloat() < 0.5 ? 1 : -1) * utils.randInt(2, 5),
        () => isMulDiv ? correctAnswer + utils.randInt(-3, 3) || correctAnswer + 1 : correctAnswer + 10,
        () => isMulDiv ? correctAnswer - utils.randInt(-3, 3) || correctAnswer - 1 : correctAnswer - 10,
        () => correctAnswer + utils.randInt(1, 9),
        () => correctAnswer - utils.randInt(1, 9),
      ];

      let attempts = 0;
      while (options.size < 4 && attempts < 100) {
        const strat = utils.pick(strategies);
        const candidate = strat();
        if (candidate >= 0 && Number.isInteger(candidate) && candidate !== correctAnswer && candidate < 1000) {
          options.add(candidate);
        }
        attempts++;
      }

      // 如果还不够 4 个，补全
      let extra = 1;
      while (options.size < 4) {
        if (!options.has(correctAnswer + extra) && correctAnswer + extra >= 0) {
          options.add(correctAnswer + extra);
        }
        if (!options.has(correctAnswer - extra) && correctAnswer - extra >= 0) {
          options.add(correctAnswer - extra);
        }
        extra++;
        if (extra > 100) break;
      }

      return utils.shuffle([...options]);
    };

    /* =================================================================
     * 模块：smartDifficulty（智能难度调节）
     * ================================================================= */
    const smartDifficulty = {
      getOrInit(levelId) {
        let stats = profiles.get('smartStats');
        if (!stats) {
          stats = { schemaVer: SCHEMA_VERSION, byLevel: {} };
          profiles.set('smartStats', stats);
        }
        if (!stats.byLevel[levelId]) {
          stats.byLevel[levelId] = {
            recentResults: [],
            totalAttempts: 0, totalCorrect: 0, totalTimeout: 0,
            avgResponseMs: 0, accuracyRate: 0,
            trendDirection: 'stable',
            dynamicTimeoutMs: null,
            suggestion: null
          };
          profiles.set('smartStats', stats);
        }
        return stats.byLevel[levelId];
      },

      save(stats, levelId) {
        const data = profiles.get('smartStats');
        data.byLevel[levelId] = stats;
        profiles.set('smartStats', data);
      },

      // 记录答题结果
      recordAttempt(levelId, correct, responseMs, timeouted) {
        const stats = this.getOrInit(levelId);
        stats.totalAttempts++;
        if (correct) stats.totalCorrect++;
        if (timeouted) stats.totalTimeout++;

        // 滑动窗口（最多 30 条）
        stats.recentResults.push({ timestamp: Date.now(), correct, responseMs, timeouted });
        if (stats.recentResults.length > 30) stats.recentResults.shift();

        this.recalcStats(stats, levelId);
        this.save(stats, levelId);
      },

      recalcStats(stats, levelId) {
        const recent = stats.recentResults;
        if (recent.length < 5) return;

        const avgMs = Math.round(recent.reduce((s, r) => s + r.responseMs, 0) / recent.length);
        const accuracy = recent.filter(r => r.correct).length / recent.length;

        stats.avgResponseMs = avgMs;
        stats.accuracyRate = accuracy;

        // 趋势判断
        if (recent.length >= 10) {
          const recent10 = recent.slice(-10);
          const prev10 = recent.slice(-20, -10);
          const rAvg = recent10.reduce((s, r) => s + r.responseMs, 0) / 10;
          const pAvg = prev10.reduce((s, r) => s + r.responseMs, 0) / 10;

          if (rAvg < pAvg * 0.9 && accuracy >= 0.8) {
            stats.trendDirection = 'improving';
          } else if (rAvg > pAvg * 1.1 || accuracy < 0.6) {
            stats.trendDirection = 'declining';
          } else {
            stats.trendDirection = 'stable';
          }
        }

        // 动态超时
        const config = levels.get(levelId);
        const baseTimeout = (config ? config.timeoutSec : 10) * 1000;

        if (accuracy >= 0.9 && (stats.avgResponseMs < baseTimeout * 0.6)) {
          // 又快又准 → 缩短超时
          stats.dynamicTimeoutMs = Math.max(3000, Math.round(baseTimeout * 0.75));
          stats.suggestion = null; // 本就合适
        } else if (accuracy < 0.6 && stats.totalAttempts >= 10) {
          // 准确率低 → 放宽超时
          stats.dynamicTimeoutMs = Math.min(30000, Math.round(baseTimeout * 1.4));
          stats.suggestion = 'easier';
        } else if (accuracy >= 0.95 && stats.trendDirection === 'improving' && stats.totalAttempts >= 20) {
          stats.dynamicTimeoutMs = Math.max(3000, Math.round(baseTimeout * 0.7));
          stats.suggestion = 'harder';
        } else {
          stats.dynamicTimeoutMs = baseTimeout;
          stats.suggestion = null;
        }
      },

      getTimeoutMs(levelId) {
        const stats = this.getOrInit(levelId);
        return stats.dynamicTimeoutMs || (levels.get(levelId) ? levels.get(levelId).timeoutSec * 1000 : 10000);
      },

      getSuggestion(levelId) {
        const stats = this.getOrInit(levelId);
        return stats.suggestion;
      },

      getLabel(levelId) {
        const stats = this.getOrInit(levelId);
        const trend = stats.trendDirection;
        const suggestion = stats.suggestion;
        if (suggestion === 'easier') return '💪 需要更多练习';
        if (suggestion === 'harder') return '⚡ 可以挑战更难关卡';
        if (trend === 'improving') return '📈 进步中！';
        if (trend === 'declining') return '💪 加油~';
        return '';
      }
    };

    /* =================================================================
     * 模块：gamification（游戏化激励）
     * ================================================================= */
    const gamification = (function() {
      const XP_EVENTS = {
        correct: 10,
        correct_streak_5: 15,
        correct_streak_10: 30,
        level_pass: 100,
        mission_complete: 50,
        achievement: 30,
        daily_first: 20
      };

      const MISSION_TEMPLATES = [
        { id: 'daily_20', type: 'questions', target: 20, title: '完成 20 题', xpReward: 30 },
        { id: 'daily_30', type: 'questions', target: 30, title: '完成 30 题', xpReward: 50 },

      const ACHIEVEMENT_DEFS = [
        { id: 'first_correct', title: '第一次答对', desc: '回答正确第一道题', icon: '🎯', xpReward: 20 },
